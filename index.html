<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RS Pro Parts</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{margin:0;background:#131313;font-family:"Space Grotesk",sans-serif;color:white;}
#app{max-width:430px;margin:0 auto;height:100vh;display:flex;flex-direction:column;}
.screen{flex:1;overflow:auto;}
button{cursor:pointer;}
</style>
</head>

<body>

<div id="app">
  <header style="padding:12px;background:#131313;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-between;">
    <strong>RS PRO PARTS</strong>
    <button onclick="go('auth')">Entrar</button>
  </header>

  <div id="scr" class="screen"></div>

  <nav style="display:flex;border-top:1px solid rgba(255,255,255,0.1);">
    <button onclick="go('feed')" style="flex:1">Feed</button>
    <button onclick="go('upload')" style="flex:1">Subir</button>
    <button onclick="go('profile')" style="flex:1">Perfil</button>
  </nav>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import{getAuth,onAuthStateChanged,signInWithEmailAndPassword,createUserWithEmailAndPassword}from"https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import{getFirestore,collection,addDoc,onSnapshot}from"https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig={
  apiKey:"TU_API_KEY",
  authDomain:"TU_DOMINIO.firebaseapp.com",
  projectId:"TU_PROJECT_ID"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let user=null;
let tab="feed";
let entries=[];

const $=id=>document.getElementById(id);

window.go=function(t){
  tab=t;
  render();
}

function render(){
  const el=$("scr");

  if(tab==="feed"){
    el.innerHTML=entries.map(e=>`
      <div style="padding:10px;border-bottom:1px solid #333;">
        <img src="${e.image}" style="width:100%">
        <p>${e.name}</p>
      </div>
    `).join("") || "<p style='padding:20px'>No hay motos aún</p>";
  }

  if(tab==="upload"){
    if(!user){
      el.innerHTML="<p style='padding:20px'>Tenes que loguearte</p>";
      return;
    }

    el.innerHTML=`
      <div style="padding:20px">
        <input id="name" placeholder="Nombre"><br><br>
        <input id="img" placeholder="URL imagen"><br><br>
        <button onclick="upload()">Subir</button>
      </div>
    `;
  }

  if(tab==="profile"){
    el.innerHTML=user
      ? `<p style="padding:20px">Logueado como ${user.email}</p>`
      : `<p style="padding:20px">No logueado</p>`;
  }

  if(tab==="auth"){
    el.innerHTML=`
      <div style="padding:20px">
        <input id="email" placeholder="email"><br><br>
        <input id="pass" type="password" placeholder="password"><br><br>
        <button onclick="login()">Entrar</button>
        <button onclick="register()">Crear cuenta</button>
      </div>
    `;
  }
}

window.login=async function(){
  const email=$("email").value;
  const pass=$("pass").value;
  await signInWithEmailAndPassword(auth,email,pass);
}

window.register=async function(){
  const email=$("email").value;
  const pass=$("pass").value;
  await createUserWithEmailAndPassword(auth,email,pass);
}

window.upload=async function(){
  const name=$("name").value;
  const image=$("img").value;

  await addDoc(collection(db,"entries"),{
    name,
    image
  });
}

onAuthStateChanged(auth,u=>{
  user=u;
  render();
});

onSnapshot(collection(db,"entries"),snap=>{
  entries=snap.docs.map(d=>d.data());
  render();
});

render();
</script>

</body>
</html>
