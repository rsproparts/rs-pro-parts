<script type="module">

const CC="ddozrdmok",CP="rs_pro_parts",ADMIN="rsmotoparts.mdp@gmail.com";
const FC={apiKey:"AIzaSyDdetAoPKD2jw4-Ar0breOf3fKCxGG8bdM",authDomain:"rs-pro-parts.firebaseapp.com",projectId:"rs-pro-parts",storageBucket:"rs-pro-parts.firebasestorage.app",messagingSenderId:"10474406260",appId:"1:10474406260:web:937cdd1db33fdf2d406c21"};
const FA=initializeApp(FC),auth=getAuth(FA),db=getFirestore(FA);
let user=null,tab="feed",entries=[],userCount=1034;
const $=id=>document.getElementById(id);
const fv=n=>n>=1000?(n/1000).toFixed(1)+"k":String(n||0);
const MEDALS=["🥇","🥈","🥉"];
const rk=i=>MEDALS[i]||("#"+(i+1));

window.openLB=function(url){if(!url)return;$("lb-img").src=url;$("lb").classList.add("open");};
window.closeLB=function(){$("lb").classList.remove("open");};
window.togMods=function(id){
  var c=$("mods-"+id),a=$("modsarr-"+id);
  if(!c)return;
  if(c.style.display==="none"){c.style.display="block";if(a)a.textContent="▲";}
  else{c.style.display="none";if(a)a.textContent="▼";}
};
window.go=function(t){
  if((t==="upload"||t==="profile")&&!user){tab="auth";rNav();rScr();return;}
  tab=t;rNav();rScr();
};
window.doVote=async function(id){
  if(!user)return;
  await updateDoc(doc(db,"entries",id),{votes:increment(1),voters:arrayUnion(user.uid)});
};
window.doDelete=async function(id){
  if(!confirm("Eliminar esta entrada?"))return;
  await deleteDoc(doc(db,"entries",id));
};
window.doLogout=async function(){await signOut(auth);tab="feed";rNav();rScr();};

// ── GOOGLE LOGIN ──
window.doGoogleLogin=async function(){
  try{
    var provider=new GoogleAuthProvider();
    var result=await signInWithPopup(auth,provider);
    var u=result.user;
    try{await setDoc(doc(db,"users",u.uid),{username:u.displayName||u.email.split("@")[0],email:u.email,createdAt:new Date().toISOString()},{merge:true});}catch(ex){}
    tab="feed";rNav();rScr();
  }catch(e){
    if(e.code!=="auth/popup-closed-by-user"){alert("Error al iniciar sesión con Google. Intentá de nuevo.");}
  }
};

// ── EMAIL LOGIN (legacy) ──
window.doEmailLogin=async function(){
  var email=$("aemail")&&$("aemail").value.trim();
  var pass=$("apass")&&$("apass").value;
  var err=$("aerr");
  if(!email||!pass){if(err){err.textContent="Completa email y contrasena";err.style.display="block";}return;}
  if(err)err.style.display="none";
  try{
    await signInWithEmailAndPassword(auth,email,pass);
    tab="feed";rNav();rScr();
  }catch(e){
    var msgs={"auth/invalid-credential":"Email o contrasena incorrectos","auth/invalid-email":"Email invalido","auth/user-not-found":"No existe esa cuenta"};
    if(err){err.textContent=msgs[e.code]||"Error. Intentá de nuevo.";err.style.display="block";}
  }
};

window.showEmailForm=function(){

};

// ── STORY ──
window.doStoryById=function(id){
  var entry=entries.find(function(e){return e.id===id;});
  if(entry)window.doStory(entry);
};
window.doStory=async function(entry){
  var btn=$("storybtn-"+entry.id);
  if(btn){btn.textContent="⏳";btn.disabled=true;}
  try{
    var canvas=$("story-canvas"),ctx=canvas.getContext("2d");
    var W=1080,H=1920;canvas.width=W;canvas.height=H;
    ctx.fillStyle="#0f0f0f";ctx.fillRect(0,0,W,200);
    var logo=new Image();logo.crossOrigin="anonymous";
    await new Promise(function(res){logo.onload=res;logo.onerror=res;logo.src="https://res.cloudinary.com/ddozrdmok/image/upload/v1776258543/Logo_rama_1_uuvrq1.png";});
    var lH=120,lW=lH*(logo.width/logo.height);
    ctx.drawImage(logo,W/2-lW/2,40,lW,lH);
    var img=new Image();img.crossOrigin="anonymous";
    await new Promise(function(res){img.onload=res;img.onerror=res;img.src=entry.imageUrl;});
    var iS=Math.min(img.width,img.height),iX=(img.width-iS)/2,iY=(img.height-iS)/2;
    ctx.save();ctx.beginPath();ctx.rect(0,200,W,W);ctx.clip();
    ctx.drawImage(img,iX,iY,iS,iS,0,200,W,W);ctx.restore();
    ctx.fillStyle="#0f0f0f";ctx.fillRect(0,200+W,W,H-(200+W));
    ctx.fillStyle="#E31B23";ctx.fillRect(0,200+W,W,6);
    ctx.textAlign="center";ctx.textBaseline="top";
    var name=(entry.username||"PILOTO").toUpperCase();
    var fs=80;ctx.font="bold "+fs+"px Arial";
    while(ctx.measureText(name).width>W-100&&fs>40){fs-=4;ctx.font="bold "+fs+"px Arial";}
    ctx.fillStyle="#ffffff";ctx.fillText(name,W/2,200+W+50);
    ctx.fillStyle="rgba(255,255,255,0.6)";ctx.font="50px Arial";
    ctx.fillText(entry.moto||"",W/2,200+W+50+fs+30);
    ctx.font="46px Arial";ctx.fillText("📍 "+(entry.location||""),W/2,200+W+50+fs+30+80);
    if(entry.instagram){ctx.fillStyle="#E31B23";ctx.font="bold 54px Arial";ctx.fillText("@"+entry.instagram,W/2,200+W+50+fs+30+80+80);}
    ctx.fillStyle="#E31B23";ctx.fillRect(0,H-10,W,10);
    canvas.toBlob(async function(blob){
      if(!blob){showStoryFallback(entry);return;}
      var file=new File([blob],"moto-del-mes.png",{type:"image/png"});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        try{await navigator.share({files:[file],title:"Moto del Mes RS Pro Parts",text:"Vota por "+entry.username+"!"});}
        catch(e){if(e.name!=="AbortError")showStoryFallback(entry);}
      }else{
        var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="moto-del-mes-rspro.png";a.click();
        showStoryFallback(entry);
      }
    },"image/png");
  }catch(e){console.error(e);showStoryFallback(entry);}
  finally{if(btn){btn.textContent="📸 Story";btn.disabled=false;}}
};
function showStoryFallback(entry){
  var pop=document.createElement("div");
  pop.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9998;display:flex;align-items:flex-end;justify-content:center;";
  pop.innerHTML='<div style="width:100%;max-width:430px;background:#131313;border-radius:16px 16px 0 0;padding:24px;text-align:center;border-top:2px solid #E31B23;"><p style="font-size:10px;color:#E31B23;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;margin:0 0 8px;">Imagen descargada ✓</p><p style="font-size:13px;color:rgba(255,255,255,0.5);margin:0 0 16px;line-height:1.6;">Abrí Instagram → Stories → Galería<br>y seleccioná la imagen descargada.</p><button onclick="this.parentElement.parentElement.remove()" style="width:100%;padding:12px;background:#E31B23;border:none;color:white;font-weight:900;font-size:14px;cursor:pointer;border-radius:4px;">Entendido</button></div>';
  document.body.appendChild(pop);
  pop.addEventListener("click",function(e){if(e.target===pop)pop.remove();});
}

// ── NAV ──
function rNav(){

    if(active)html+='<div style="width:16px;height:2px;background:#E31B23;margin-top:1px;"></div>';
    html+='</button>';
  });
  nav.innerHTML=html;
}

function rHdr(){
  var el=$("huser");if(!el)return;

    el.innerHTML='<div onclick="go(\'profile\')" style="width:32px;height:32px;background:#E31B23;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;cursor:pointer;">'+l+'</div>';

  }
}

function loadE(){
  userCount=1034;
  onSnapshot(query(collection(db,"entries"),orderBy("votes","desc")),function(snap){
    entries=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    if(["feed","ranking","profile"].includes(tab))rScr();
  });
}

function rScr(){
  var el=$("scr");if(!el)return;
  el.className="screen fade-in";
  var map={feed:sFeed,ranking:sRank,upload:sUpload,profile:sProfile,auth:sAuth};

function sFeed(){
  if(!entries.length){
    return '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;padding:32px;text-align:center;"><div style="font-size:48px;">🏍️</div><h3 style="font-weight:900;text-transform:uppercase;font-style:italic;margin:0;">Se el primero</h3><p style="color:rgba(255,255,255,0.4);font-size:13px;margin:0;">Subi tu moto y arranca!</p></div>';
  }

// ── ADMIN FUNCTIONS ──
window.showVoters=async function(entryId){
  var entry=entries.find(function(e){return e.id===entryId;});
  if(!entry){alert("No encontre la entrada.");return;}
  var voters=entry.voters||[];
  if(!voters.length){alert("Esta moto no tiene votos.");return;}
  var knownUids={};
  entries.forEach(function(e){if(e.uid)knownUids[e.uid]=e.username;});
  var sinNombre=[],conNombre=[];
  voters.forEach(function(uid){
    if(knownUids[uid])conNombre.push({uid:uid,name:knownUids[uid]});
    else sinNombre.push(uid);
  });
  var pop=document.createElement("div");
  pop.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:9999;display:flex;align-items:flex-end;justify-content:center;";
  var listHtml="";
  if(sinNombre.length){
    listHtml+='<div style="font-size:10px;color:#ff5050;font-weight:700;text-transform:uppercase;margin:8px 0 4px;">🚨 Sin perfil — posibles truchos ('+sinNombre.length+')</div>';
    sinNombre.forEach(function(uid){listHtml+='<div style="font-size:10px;font-family:monospace;padding:3px 0;color:#ff8080;border-bottom:1px solid rgba(255,255,255,0.04);">'+uid+'</div>';});
  }
  if(conNombre.length){
    listHtml+='<div style="font-size:10px;color:rgba(100,255,100,0.7);font-weight:700;text-transform:uppercase;margin:12px 0 4px;">✅ Con perfil — votos reales ('+conNombre.length+')</div>';
    conNombre.forEach(function(v){listHtml+='<div style="font-size:10px;font-family:monospace;padding:3px 0;color:rgba(255,255,255,0.5);border-bottom:1px solid rgba(255,255,255,0.04);">'+v.name+'</div>';});
  }
  var btnLimpiar=sinNombre.length?'<button onclick="window.limpiarTruchos(\''+entryId+'\',this.closest(\'[data-pop]\'))" style="width:100%;margin-top:12px;padding:12px;background:rgba(255,50,50,0.2);border:1px solid rgba(255,50,50,0.5);color:#ff5050;font-weight:900;font-size:12px;cursor:pointer;border-radius:4px;text-transform:uppercase;">🗑️ Eliminar '+sinNombre.length+' votos sin perfil</button>':'';
  pop.innerHTML='<div data-pop="1" style="width:100%;max-width:430px;background:#131313;border-radius:16px 16px 0 0;padding:20px;border-top:2px solid #E31B23;max-height:80vh;display:flex;flex-direction:column;">'
    +'<p style="font-size:11px;color:#E31B23;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;margin:0 0 2px;">Voters ('+voters.length+')</p>'
    +'<p style="font-size:10px;color:rgba(255,255,255,0.3);margin:0 0 8px;">'+sinNombre.length+' sin perfil · '+conNombre.length+' reales</p>'
    +'<div style="overflow-y:auto;flex:1;">'+listHtml+'</div>'
    +btnLimpiar
    +'<button onclick="this.closest(\'[data-pop]\').parentElement.remove()" style="width:100%;margin-top:8px;padding:12px;background:#E31B23;border:none;color:white;font-weight:900;font-size:13px;cursor:pointer;border-radius:4px;">Cerrar</button>'
    +'</div>';
  document.body.appendChild(pop);
  pop.addEventListener("click",function(e){if(e.target===pop)pop.remove();});
};

window.limpiarTruchos=async function(entryId,popEl){
  var entry=entries.find(function(e){return e.id===entryId;});
  if(!entry)return;
  var knownUids={};
  entries.forEach(function(e){if(e.uid)knownUids[e.uid]=e.username;});
  var votersReales=(entry.voters||[]).filter(function(uid){return !!knownUids[uid];});
  var eliminados=(entry.voters||[]).length-votersReales.length;
  if(!confirm("Eliminar "+eliminados+" votos sin perfil y dejar "+votersReales.length+" votos reales?"))return;
  try{
    await updateDoc(doc(db,"entries",entryId),{votes:votersReales.length,voters:votersReales});
    alert("Listo. Se eliminaron "+eliminados+" votos truchos.");
    if(popEl&&popEl.parentElement)popEl.parentElement.remove();
  }catch(e){alert("Error: "+e.message);}
};

window.resetVotes=async function(entryId){
  if(!confirm("Resetear los votos de esta moto a 0?"))return;
  try{
    await updateDoc(doc(db,"entries",entryId),{votes:0,voters:[]});
    alert("Votos reseteados a 0.");
  }catch(e){alert("Error: "+e.message);}
};

window.setVotos=async function(entryId){
  var entry=entries.find(function(e){return e.id===entryId;});
  var username=entry?entry.username:"esta moto";
  var n=prompt("Cuantos votos para "+username+"? (reemplaza el total actual)");
  if(n===null||n==="")return;
  var num=parseInt(n);
  if(isNaN(num)||num<0){alert("Numero invalido");return;}
  if(!confirm("Setear "+num+" votos para "+username+"?"))return;
  try{
    await updateDoc(doc(db,"entries",entryId),{votes:num,voters:[]});
    alert("Listo. "+username+" ahora tiene "+num+" votos.");
  }catch(e){alert("Error: "+e.message);}
};

// ── WINNERS ──
function loadWinners(){
  var wlist=document.getElementById("winners-list");if(!wlist)return;
  onSnapshot(query(collection(db,"winners"),orderBy("date","desc")),function(snap){
    if(snap.empty){wlist.innerHTML='<p style="color:rgba(255,255,255,0.3);font-size:12px;text-align:center;margin:8px 0;">Aun no hay ganadores registrados.</p>';return;}
    var whtml="";
    snap.docs.forEach(function(d){
      var w=d.data();
      whtml+='<div style="display:flex;align-items:center;gap:10px;padding:8px;background:#131313;border-radius:2px;margin-bottom:6px;"><img src="'+w.imageUrl+'" style="width:52px;height:52px;object-fit:cover;border-radius:2px;flex-shrink:0;"/><div style="flex:1;min-width:0;"><p style="font-weight:900;font-size:13px;text-transform:uppercase;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+w.username+'</p><p style="color:rgba(255,255,255,0.4);font-size:10px;margin:2px 0;">'+w.month+' · '+w.votes+' votos</p>'+(w.instagram?'<p style="font-size:10px;font-weight:700;margin:0;"><span style="color:#E31B23;">@</span>'+w.instagram+'</p>':'')+'</div><span style="font-size:22px;">🏆</span></div>';
    });
    wlist.innerHTML=whtml;
  });
}

window.doSorteo=async function(){
  if(!entries.length){alert("No hay participantes.");return;}
  var top=entries.slice(0,3);
  var winner=top[Math.floor(Math.random()*top.length)];
  var now3=new Date();
  var monthName=now3.toLocaleString("es-AR",{month:"long",year:"numeric"}).toUpperCase();
  if(!confirm("Ganador sorteado: "+winner.username+" con "+winner.votes+" votos. Confirmar y guardar en el historial?"))return;
  try{
    await addDoc(collection(db,"winners"),{uid:winner.uid||"",username:winner.username||"ANONIMO",instagram:winner.instagram||"",moto:winner.moto||"",imageUrl:winner.imageUrl||"",votes:winner.votes||0,month:monthName,date:new Date().toISOString()});
    alert("Ganador guardado! "+winner.username+" quedo en el historial.");
    rScr();
  }catch(err){alert("Error: "+err.message);}
};
