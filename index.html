window.openLB=function(url){if(!url)return;$("lb-img").src=url;$("lb").classList.add("open");};
window.closeLB=function(){$("lb").classList.remove("open");};
window.togMods=function(id){
  var c=$("mods-"+id);var a=$("modsarr-"+id);
  if(!c)return;
  if(c.style.display==="none"){c.style.display="block";if(a)a.textContent="▲";}
  else{c.style.display="none";if(a)a.textContent="▼";}
};
window.go=function(t){
  if((t==="upload"||t==="profile")&&!user){tab="auth";rNav();rScr();return;}
  tab=t;rNav();rScr();
};
window.doVote=async function(id){
  if(!user)return;
  if(!user.emailVerified){
    alert("Verificá tu email antes de votar. Revisá tu casilla de correo.");
    return;
  }
  await updateDoc(doc(db,"entries",id),{votes:increment(1),voters:arrayUnion(user.uid)});
};
window.doDelete=async function(id){

};

// ── SHARE STORY ──
window.doStoryById=function(id){
  var entry=entries.find(function(e){return e.id===id;});
  if(entry) window.doStory(entry);
};

window.doStory=async function(entry){
  var btn=$("storybtn-"+entry.id);
  if(btn){btn.textContent="⏳";btn.disabled=true;}
  try{
    var canvas=$("story-canvas");
    var ctx=canvas.getContext("2d");
    var W=1080, H=1920;
    canvas.width=W; canvas.height=H;

    // ── ZONA 1: HEADER negro con logo (0 a 200)
    ctx.fillStyle="#0f0f0f";
    ctx.fillRect(0,0,W,200);
    var logo=new Image();
    logo.crossOrigin="anonymous";
    await new Promise(function(res){logo.onload=res;logo.onerror=res;logo.src="https://res.cloudinary.com/ddozrdmok/image/upload/v1776258543/Logo_rama_1_uuvrq1.png";});
    var lH=120, lW=lH*(logo.width/logo.height);
    ctx.drawImage(logo, W/2-lW/2, 40, lW, lH);

    // ── ZONA 2: FOTO cuadrada (200 a 1280 = 1080px)
    var img=new Image();
    img.crossOrigin="anonymous";
    await new Promise(function(res){img.onload=res;img.onerror=res;img.src=entry.imageUrl;});
    var iS=Math.min(img.width,img.height);
    var iX=(img.width-iS)/2;
    var iY=(img.height-iS)/2;
    ctx.save();
    ctx.beginPath();
    ctx.rect(0,200,W,W);
    ctx.clip();
    ctx.drawImage(img,iX,iY,iS,iS,0,200,W,W);
    ctx.restore();

    // ── ZONA 3: TEXTO negro debajo (1280 a 1920)
    ctx.fillStyle="#0f0f0f";
    ctx.fillRect(0,200+W,W,H-(200+W));

    // separador rojo
    ctx.fillStyle="#E31B23";
    ctx.fillRect(0,200+W,W,6);

    ctx.textAlign="center";
    ctx.textBaseline="top";

    // nombre - auto tamaño
    var name=(entry.username||"PILOTO").toUpperCase();
    var fs=80;
    ctx.font="bold "+fs+"px Arial";
    while(ctx.measureText(name).width>W-100&&fs>40){fs-=4;ctx.font="bold "+fs+"px Arial";}
    ctx.fillStyle="#ffffff";
    ctx.fillText(name, W/2, 200+W+50);

    // modelo moto
    ctx.fillStyle="rgba(255,255,255,0.6)";
    ctx.font="50px Arial";
    ctx.fillText(entry.moto||"", W/2, 200+W+50+fs+30);

    // ciudad
    ctx.font="46px Arial";
    ctx.fillText("📍 "+(entry.location||""), W/2, 200+W+50+fs+30+80);

    // instagram
    if(entry.instagram){
      ctx.fillStyle="#E31B23";
      ctx.font="bold 54px Arial";
      ctx.fillText("@"+entry.instagram, W/2, 200+W+50+fs+30+80+80);
    }

    // barra roja inferior
    ctx.fillStyle="#E31B23";
    ctx.fillRect(0,H-10,W,10);

    // export
    canvas.toBlob(async function(blob){
      if(!blob){showStoryFallback(entry);return;}
      var file=new File([blob],"moto-del-mes.png",{type:"image/png"});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        try{await navigator.share({files:[file],title:"Moto del Mes RS Pro Parts",text:"Vota por "+entry.username+"!"});}
        catch(e){if(e.name!=="AbortError")showStoryFallback(entry);}
      }else{
        var a=document.createElement("a");
        a.href=URL.createObjectURL(blob);
        a.download="moto-del-mes-rspro.png";
        a.click();
        showStoryFallback(entry);
      }
    },"image/png");
  }catch(e){
    console.error(e);showStoryFallback(entry);
  }finally{
    if(btn){btn.textContent="📸 Story";btn.disabled=false;}
  }
};

function showStoryFallback(entry){
  var pop=document.createElement("div");
  pop.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9998;display:flex;align-items:flex-end;justify-content:center;";
  pop.innerHTML='<div style="width:100%;max-width:430px;background:#131313;border-radius:16px 16px 0 0;padding:24px;text-align:center;border-top:2px solid #E31B23;">'

    +'</div>';
  document.body.appendChild(pop);
  pop.addEventListener("click",function(e){if(e.target===pop)pop.remove();});
}

  entries.forEach(function(e,i){

  html+='<div><label style="font-size:10px;color:#E31B23;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;display:block;margin-bottom:6px;">Contrasena</label><input id="apass" type="password" placeholder="..." style="width:100%;background:#1c1b1b;border:1px solid rgba(255,255,255,0.1);outline:none;padding:12px;font-size:13px;color:white;" onfocus="this.style.borderColor=\'#E31B23\'" onblur="this.style.borderColor=\'rgba(255,255,255,0.1)\'" /></div>';

  }
  html+='<button id="abtn" onclick="doAuth()" style="width:100%;padding:14px;background:#E31B23;border:none;color:white;font-weight:900;font-size:13px;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;margin-top:4px;">'+(isReg?"Crear cuenta":"Entrar")+'</button>';
  html+='<button onclick="toggleAM()" style="background:transparent;border:none;color:rgba(255,255,255,0.3);font-size:12px;cursor:pointer;padding:4px;">'+(isReg?"Ya tenes cuenta? Ingresa":"No tenes cuenta? Registrate")+'</button>';

window.doAuth=async function(){
  var email=$("aemail")&&$("aemail").value.trim();
  var pass=$("apass")&&$("apass").value;
  var uname=$("auser")&&$("auser").value.trim();
  var err=$("aerr"),btn=$("abtn");
  if(!email||!pass){err.textContent="Completa email y contrasena";err.style.display="block";return;}
  if(amode==="register"&&!uname){err.textContent="Elegi un nombre de piloto";err.style.display="block";return;}
  if(amode==="register"){
    var emailLow=email.toLowerCase();
    // Bloquear dominios de emails desechables y truchos
    var domBloqueados=["latam","tempmail","mailinator","guerrillamail","yopmail","throwam","dispostable","trashmail","fakeinbox","spamgourmet","sharklasers","getairmail","maildrop","discard.email","spambox","nada.email","throwam","mintemail","meltmail","filzmail","sogetthis","haltospam","spam4.me","tempr.email","mytrashmail","trashdevil","mailnull","spamgob","notmailinator"];
    if(domBloqueados.some(function(d){return emailLow.includes(d);})){
      err.textContent="Este dominio de email no está permitido.";err.style.display="block";btn.textContent="Crear cuenta";btn.disabled=false;return;
    }
    // Bloquear patron trucho: 8 o mas numeros seguidos en el email
    var localPart=emailLow.split("@")[0];
    if(/\d{8,}/.test(localPart)){
      err.textContent="Este email no es válido para registrarse.";err.style.display="block";btn.textContent="Crear cuenta";btn.disabled=false;return;
    }
  }
  if(amode==="register"){
    var captchaResp=window.grecaptcha?window.grecaptcha.getResponse():"";
    if(!captchaResp){err.textContent="Completá el captcha para continuar.";err.style.display="block";return;}
  }
  err.style.display="none";btn.textContent="...";btn.disabled=true;
  try{
    if(amode==="register"){
      var c=await createUserWithEmailAndPassword(auth,email,pass);
      await updateProfile(c.user,{displayName:uname});
      userCount++;
      try{await setDoc(doc(db,"users",c.user.uid),{username:uname,createdAt:new Date().toISOString()});}catch(ex){}
    } else{await signInWithEmailAndPassword(auth,email,pass);}
    amode="login";tab="feed";rNav();rScr();
  }catch(e){
    var msgs={"auth/email-already-in-use":"Ese email ya esta registrado","auth/weak-password":"La contrasena debe tener al menos 6 caracteres","auth/invalid-credential":"Email o contrasena incorrectos","auth/invalid-email":"Email invalido"};
    err.textContent=msgs[e.code]||"Error. Intenta de nuevo.";
    err.style.display="block";
    btn.textContent=amode==="login"?"Entrar":"Crear cuenta";
    btn.disabled=false;
    if(amode==="register"&&window.grecaptcha){try{window.grecaptcha.reset();}catch(ex){}}
  }
};

    var whtml="";

window.doSorteo=async function(){
  if(!entries.length){alert("No hay participantes.");return;}
  var top=entries.slice(0,3);
  var winner=top[Math.floor(Math.random()*top.length)];
  var now3=new Date();
  var monthName=now3.toLocaleString("es-AR",{month:"long",year:"numeric"}).toUpperCase();
  if(!confirm("Ganador sorteado: "+winner.username+" con "+winner.votes+" votos. Confirmar y guardar en el historial?")){return;}
  try{
    await addDoc(collection(db,"winners"),{uid:winner.uid||"",username:winner.username||"ANONIMO",instagram:winner.instagram||"",moto:winner.moto||"",imageUrl:winner.imageUrl||"",votes:winner.votes||0,month:monthName,date:new Date().toISOString()});
    alert("Ganador guardado! "+winner.username+" quedo en el historial.");
    rScr();
  }catch(err){alert("Error: "+err.message);}
};
