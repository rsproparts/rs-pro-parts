<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Wheelie · RS Pro Parts</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;overflow:hidden;height:100dvh;font-family:'Barlow Condensed',sans-serif;color:white;-webkit-user-select:none;user-select:none;}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;}

/* SCREENS */
.screen{
  position:fixed;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#0a0a0a;z-index:100;
}
.screen.off{display:none;}

.logo{height:50px;margin-bottom:16px;object-fit:contain;}
.gtitle{font-family:'Bebas Neue';font-size:76px;line-height:.9;letter-spacing:3px;text-align:center;}
.gtitle em{color:#E31B23;font-style:normal;}
.gsub{font-size:13px;color:rgba(255,255,255,.35);letter-spacing:.25em;text-transform:uppercase;margin-top:8px;text-align:center;}

.btn{
  margin-top:28px;
  background:#E31B23;color:white;
  font-family:'Bebas Neue';font-size:28px;letter-spacing:3px;
  padding:14px 52px;border:none;cursor:pointer;
  clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);
  display:block;text-align:center;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.btn:active{background:#c0151c;}
.btn-sec{
  margin-top:12px;
  background:transparent;color:rgba(255,255,255,.4);
  font-family:'Barlow Condensed';font-size:14px;letter-spacing:.15em;text-transform:uppercase;
  padding:10px 28px;border:1px solid rgba(255,255,255,.15);cursor:pointer;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.hint{margin-top:18px;font-size:12px;color:rgba(255,255,255,.25);letter-spacing:.15em;text-transform:uppercase;text-align:center;line-height:2.2;}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:10px 16px;z-index:50;pointer-events:none;}
.hv{font-family:'Bebas Neue';font-size:40px;line-height:1;}
.hv.r{color:#E31B23;}
.hl{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:.15em;text-transform:uppercase;}

/* Wheelie bar */
#wb-wrap{position:fixed;right:10px;top:50%;transform:translateY(-50%);width:8px;height:150px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;z-index:50;}
#wb{position:absolute;bottom:0;width:100%;height:0%;border-radius:99px;background:#E31B23;}
#wb-lbl{position:fixed;right:25px;top:50%;transform:translateY(-50%) rotate(-90deg);font-size:9px;color:rgba(255,255,255,.2);letter-spacing:.15em;text-transform:uppercase;white-space:nowrap;pointer-events:none;z-index:50;}

/* Touch zones */
#tz-l,#tz-r{
  position:fixed;bottom:0;width:50%;height:50%;z-index:60;
  -webkit-tap-highlight-color:transparent;
  touch-action:none;
}
#tz-l{left:0;}
#tz-r{right:0;}
.tz-lbl{position:fixed;bottom:18px;font-size:11px;letter-spacing:.2em;text-transform:uppercase;z-index:61;pointer-events:none;}
#tl-lbl{left:0;width:50%;text-align:center;color:rgba(227,27,35,.5);}
#tr-lbl{right:0;width:50%;text-align:center;color:rgba(255,255,255,.2);}

/* Flash */
#flash{position:fixed;inset:0;background:#E31B23;opacity:0;pointer-events:none;z-index:200;}

/* Score */
.bignum{font-family:'Bebas Neue';font-size:88px;color:#E31B23;line-height:1;text-align:center;}
.srow{display:flex;gap:28px;margin:8px 0 20px;}
.sitem .n{font-family:'Bebas Neue';font-size:38px;text-align:center;}
.sitem .l{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.15em;text-transform:uppercase;text-align:center;}
</style>
</head>
<body>

<!-- START -->
<div id="scr-start" class="screen">
  <img class="logo" src="https://res.cloudinary.com/ddozrdmok/image/upload/v1776258543/Logo_rama_1_uuvrq1.png"/>
  <div class="gtitle">WHEE<em>LIE</em></div>
  <div class="gsub">RS Pro Parts · Arcade</div>
  <button class="btn" id="btn-start">JUGAR</button>
  <div class="hint">
    A = Wheelie ↑ &nbsp;|&nbsp; D = Bajar ↓<br/>
    Celular: Izquierda sube · Derecha baja
  </div>
</div>

<!-- GAME OVER -->
<div id="scr-over" class="screen off">
  <div class="gtitle">GAME <em>OVER</em></div>
  <div style="margin-top:16px;font-size:12px;color:rgba(255,255,255,.3);letter-spacing:.2em;text-transform:uppercase;">Puntaje</div>
  <div class="bignum" id="fs-score">0</div>
  <div class="srow">
    <div class="sitem"><div class="n" id="fs-dist">0m</div><div class="l">Distancia</div></div>
    <div class="sitem"><div class="n" id="fs-best">0</div><div class="l">Mejor</div></div>
    <div class="sitem"><div class="n" id="fs-wc">0</div><div class="l">Wheelies</div></div>
  </div>
  <button class="btn" id="btn-retry">DE NUEVO</button>
  <button class="btn-sec" id="btn-menu">MENÚ</button>
</div>

<!-- HUD -->
<div id="hud">
  <div><div class="hl">Score</div><div class="hv r" id="h-score">0</div></div>
  <div style="text-align:center"><div class="hl">Wheelie</div><div class="hv" id="h-wt">0s</div></div>
  <div style="text-align:right"><div class="hl">Mejor</div><div class="hv" id="h-best">0</div></div>
</div>
<div id="wb-wrap"><div id="wb"></div></div>
<div id="wb-lbl">BALANCE</div>

<!-- Touch zones -->
<div id="tz-l"></div>
<div id="tz-r"></div>
<div class="tz-lbl" id="tl-lbl">⬆ WHEELIE (A)</div>
<div class="tz-lbl" id="tr-lbl">BAJAR (D) ⬇</div>

<!-- Flash -->
<div id="flash"></div>

<!-- Canvas -->
<canvas id="cv"></canvas>

<script>
// ─────────────────────────────────────────────
// GLOBALS
// ─────────────────────────────────────────────
var CV = document.getElementById('cv');
var CX = CV.getContext('2d');
var RED = '#E31B23';
var W, H, GY;
var raf, gameOn = false;
var liftKey = false;   // A / left zone  → lift front wheel
var lowerKey = false;  // D / right zone → lower front wheel
var bestScore = 0;

// Moto
var angle = 0, angVel = 0, speed = 0;
var camX = 0, scoreF = 0, score = 0;
var wCount = 0, wOn = false, wTime = 0;
var parts = [], marks = [], obs = [], spT = 0;

var LIFT  = 0.045;   // lift power
var LOWER = 0.055;   // lower power
var GRAV  = 0.020;   // gravity (nose falls)
var DAMP  = 0.88;    // angular damping
var CRASH = 1.05;    // crash angle
var WB    = 76;      // wheelbase px

// ─────────────────────────────────────────────
// RESIZE
// ─────────────────────────────────────────────
function resize() {
  W = CV.width  = window.innerWidth;
  H = CV.height = window.innerHeight;
  GY = Math.floor(H * 0.70);
}

// ─────────────────────────────────────────────
// INPUT — attached on DOMContentLoaded
// ─────────────────────────────────────────────
function setupInput() {
  var tzl = document.getElementById('tz-l');
  var tzr = document.getElementById('tz-r');

  // Touch left = lift
  tzl.addEventListener('touchstart', function(e) { e.preventDefault(); liftKey = true; }, { passive: false });
  tzl.addEventListener('touchend',   function(e) { e.preventDefault(); liftKey = false; }, { passive: false });
  tzl.addEventListener('touchcancel',function(e) { e.preventDefault(); liftKey = false; }, { passive: false });

  // Touch right = lower
  tzr.addEventListener('touchstart', function(e) { e.preventDefault(); lowerKey = true; }, { passive: false });
  tzr.addEventListener('touchend',   function(e) { e.preventDefault(); lowerKey = false; }, { passive: false });
  tzr.addEventListener('touchcancel',function(e) { e.preventDefault(); lowerKey = false; }, { passive: false });

  // Mouse left
  tzl.addEventListener('mousedown',  function() { liftKey = true; });
  tzl.addEventListener('mouseup',    function() { liftKey = false; });
  tzl.addEventListener('mouseleave', function() { liftKey = false; });

  // Mouse right
  tzr.addEventListener('mousedown',  function() { lowerKey = true; });
  tzr.addEventListener('mouseup',    function() { lowerKey = false; });
  tzr.addEventListener('mouseleave', function() { lowerKey = false; });

  // Keyboard
  document.addEventListener('keydown', function(e) {
    if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft')  { e.preventDefault(); liftKey = true; }
    if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') { e.preventDefault(); lowerKey = true; }
  });
  document.addEventListener('keyup', function(e) {
    if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft')  liftKey = false;
    if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') lowerKey = false;
  });

  // Buttons
  document.getElementById('btn-start').addEventListener('click', startGame);
  document.getElementById('btn-retry').addEventListener('click', startGame);
  document.getElementById('btn-menu').addEventListener('click', showStart);

  // Also touchend for mobile buttons
  document.getElementById('btn-start').addEventListener('touchend', function(e) { e.preventDefault(); startGame(); });
  document.getElementById('btn-retry').addEventListener('touchend', function(e) { e.preventDefault(); startGame(); });
  document.getElementById('btn-menu').addEventListener('touchend',  function(e) { e.preventDefault(); showStart(); });
}

// ─────────────────────────────────────────────
// SCREENS
// ─────────────────────────────────────────────
function showStart() {
  document.getElementById('scr-start').classList.remove('off');
  document.getElementById('scr-over').classList.add('off');
  gameOn = false;
  if (raf) cancelAnimationFrame(raf);
}

function startGame() {
  document.getElementById('scr-start').classList.add('off');
  document.getElementById('scr-over').classList.add('off');
  resize();

  angle = 0; angVel = 0; speed = 2.5;
  camX = 0; scoreF = 0; score = 0;
  wCount = 0; wOn = false; wTime = 0;
  parts = []; obs = []; spT = 0;
  liftKey = false; lowerKey = false;

  marks = [];
  for (var i = 0; i < 80; i++) marks.push(i * 110);

  gameOn = true;
  if (raf) cancelAnimationFrame(raf);
  loop();
}

// ─────────────────────────────────────────────
// LOOP
// ─────────────────────────────────────────────
function loop() {
  raf = requestAnimationFrame(loop);
  update();
  render();
}

// ─────────────────────────────────────────────
// UPDATE
// ─────────────────────────────────────────────
function update() {
  if (!gameOn) return;

  // Speed
  speed = Math.min(speed + 0.006, 7);
  camX += speed;

  // Angular physics
  if (liftKey)  angVel -= LIFT;   // lift front wheel
  if (lowerKey) angVel += LOWER;  // push front wheel down

  // Natural gravity: only when nose is up
  if (angle < -0.06) {
    angVel += GRAV; // gravity pulls nose back down
  } else if (!liftKey && !lowerKey) {
    // Snap to flat when not pressing
    angVel *= 0.6;
    if (Math.abs(angle) < 0.02) { angle = 0; angVel = 0; }
  }

  angVel *= DAMP;
  angle  += angVel;

  // Floor: can't go below 0 (front wheel on ground)
  if (angle > 0) { angle = 0; angVel = Math.min(0, angVel); }
  // Crash limit
  if (angle < -(CRASH)) { crash(); return; }

  // Wheelie detection
  var inW = angle < -0.28;
  if (inW) {
    wTime += 1/60;
    scoreF += speed * 0.6;
    wOn = true;
  } else {
    if (wOn && wTime > 0.4) wCount++;
    wOn = false;
    wTime = Math.max(0, wTime - 0.01);
  }

  // Wheelie bar
  var bp = Math.max(0, Math.min(100, (-angle / CRASH) * 100));
  var wb = document.getElementById('wb');
  wb.style.height = bp + '%';
  wb.style.background = bp > 80 ? '#ff3333' : bp > 55 ? '#ff8800' : RED;

  // Score
  scoreF += speed * 0.04;
  score = Math.floor(scoreF);
  if (score > bestScore) bestScore = score;
  document.getElementById('h-score').textContent = score;
  document.getElementById('h-wt').textContent    = wTime.toFixed(1) + 's';
  document.getElementById('h-best').textContent  = bestScore;

  // Obstacles
  spT++;
  if (spT > 130 + Math.random() * 90) {
    spT = 0;
    obs.push({ x: camX + W + 60 + Math.random() * 120, type: Math.random() < 0.6 ? 'cone' : 'bump', hit: false });
  }
  obs = obs.filter(function(o) { return o.x > camX - 100; });
  var mx = W * 0.28;
  obs.forEach(function(o) {
    var ox = mx + (o.x - camX);
    if (!o.hit && ox > mx - 20 && ox < mx + 40) {
      if (o.type === 'cone' && angle > -0.4) { crash(); }
      else if (o.type === 'bump') { scoreF += 30; }
      o.hit = true;
    }
  });

  // Tire smoke particles
  if (inW && Math.random() < 0.5) {
    parts.push({ x: W*0.28 - 30, y: GY, vx: -Math.random()*2-0.5, vy: -Math.random()*2, life: 1, r: 2+Math.random()*3 });
  }
  parts.forEach(function(p) { p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life-=0.04; });
  parts = parts.filter(function(p) { return p.life > 0; });

  // Recycle road marks
  marks.forEach(function(m, i) { if (m - camX < -60) marks[i] += 80*110; });
}

// ─────────────────────────────────────────────
// CRASH
// ─────────────────────────────────────────────
function crash() {
  if (!gameOn) return;
  gameOn = false;
  liftKey = false; lowerKey = false;

  var fl = document.getElementById('flash');
  fl.style.transition = 'none';
  fl.style.opacity = '0.7';
  setTimeout(function() {
    fl.style.transition = 'opacity 0.3s';
    fl.style.opacity = '0';
  }, 80);

  if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

  setTimeout(function() {
    document.getElementById('fs-score').textContent = score;
    document.getElementById('fs-dist').textContent  = Math.floor(camX / 40) + 'm';
    document.getElementById('fs-best').textContent  = bestScore;
    document.getElementById('fs-wc').textContent    = wCount;
    document.getElementById('scr-over').classList.remove('off');
  }, 700);
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function render() {
  CX.clearRect(0, 0, W, H);
  var t = Date.now();

  // Sky
  var sk = CX.createLinearGradient(0, 0, 0, GY);
  sk.addColorStop(0, '#060606');
  sk.addColorStop(1, '#140508');
  CX.fillStyle = sk;
  CX.fillRect(0, 0, W, GY);

  // Buildings
  CX.fillStyle = '#0e0e0e';
  var blds = [{x:0,w:55,h:85},{x:70,w:35,h:120},{x:120,w:70,h:65},{x:210,w:45,h:100},{x:270,w:60,h:80},{x:360,w:80,h:110},{x:460,w:50,h:70}];
  var off = (camX * 0.12) % W;
  blds.forEach(function(b) {
    for (var r = -1; r <= 1; r++) {
      var bx = (b.x - off + r * W + W * 2) % (W * 2) - 80;
      CX.fillRect(bx, GY - b.h, b.w, b.h);
    }
  });

  // Ground
  CX.fillStyle = '#181818';
  CX.fillRect(0, GY, W, H - GY);
  CX.strokeStyle = RED; CX.lineWidth = 2;
  CX.beginPath(); CX.moveTo(0, GY); CX.lineTo(W, GY); CX.stroke();
  var gg = CX.createLinearGradient(0, GY, 0, GY + 20);
  gg.addColorStop(0, 'rgba(227,27,35,0.1)'); gg.addColorStop(1, 'rgba(0,0,0,0)');
  CX.fillStyle = gg; CX.fillRect(0, GY, W, 20);

  // Road marks
  CX.fillStyle = 'rgba(255,255,255,0.07)';
  marks.forEach(function(m) {
    var sx = m - camX;
    if (sx > -50 && sx < W + 10) CX.fillRect(sx, GY + 14, 36, 5);
  });

  // Obstacles
  var mx = W * 0.28;
  obs.forEach(function(o) {
    var ox = mx + (o.x - camX);
    if (ox < -60 || ox > W + 60) return;
    CX.save(); CX.translate(ox, GY);
    if (o.type === 'cone') {
      CX.fillStyle = RED;
      CX.beginPath(); CX.moveTo(0,0); CX.lineTo(-10,-30); CX.lineTo(10,-30); CX.closePath(); CX.fill();
      CX.fillStyle = 'white'; CX.fillRect(-8,-17,16,4);
    } else {
      CX.fillStyle = '#2a2a2a';
      CX.beginPath(); CX.ellipse(0,-3,18,7,0,0,Math.PI*2); CX.fill();
    }
    CX.restore();
  });

  // Particles
  parts.forEach(function(p) {
    CX.save(); CX.globalAlpha = p.life * 0.5;
    CX.fillStyle = '#aaa';
    CX.beginPath(); CX.arc(p.x, p.y, p.r, 0, Math.PI*2); CX.fill();
    CX.restore();
  });

  // Speed lines
  if (speed > 5) {
    CX.save(); CX.globalAlpha = (speed-5)/7*0.1;
    CX.strokeStyle = 'white'; CX.lineWidth = 1;
    for (var i = 0; i < 8; i++) {
      var y = (i / 8) * GY;
      var l = 50 + Math.random() * 80;
      CX.beginPath(); CX.moveTo(W*0.6, y); CX.lineTo(W*0.6+l, y); CX.stroke();
    }
    CX.restore();
  }

  // MOTO — origin = rear axle at ground level
  CX.save();
  CX.translate(mx, GY);
  CX.rotate(angle);
  drawMoto(CX, t);
  CX.restore();
}

// ─────────────────────────────────────────────
// MOTO — Pixel Art Honda XR, rear axle at (0,0)
// Scale: 1 unit ≈ 1px on reference grid (moto ~120px wide)
// ─────────────────────────────────────────────
var S = 1.15; // scale factor

function px(c, color, x, y, w, h) {
  c.fillStyle = color;
  c.fillRect(x*S, y*S, w*S, h*S);
}

function drawMoto(c, t) {
  c.save();
  c.scale(S, S); // already inside save/restore with translate+rotate

  // ── WHEELS ──
  drawWheel(c, -1,  0, 19, t); // rear
  drawWheel(c, 75,  0, 18, t); // front

  // ── SWINGARM ──
  c.strokeStyle='#888'; c.lineWidth=4;
  c.beginPath(); c.moveTo(-1,-3); c.lineTo(16,-22); c.stroke();

  // ── MAIN FRAME ──
  c.strokeStyle='#aaa'; c.lineWidth=3.5;
  // Down tube
  c.beginPath(); c.moveTo(16,-22); c.lineTo(36,-16); c.stroke();
  // Top tube  
  c.beginPath(); c.moveTo(16,-22); c.lineTo(56,-40); c.stroke();
  // Seat tube
  c.beginPath(); c.moveTo(36,-16); c.lineTo(56,-40); c.stroke();
  // Subframe left
  c.strokeStyle='#777'; c.lineWidth=2.5;
  c.beginPath(); c.moveTo(16,-22); c.lineTo(0,-34); c.lineTo(-10,-24); c.stroke();

  // ── REAR SHOCK ──
  c.strokeStyle='#999'; c.lineWidth=3;
  c.beginPath(); c.moveTo(6,-8); c.lineTo(20,-30); c.stroke();
  c.strokeStyle='#E31B23'; c.lineWidth=2;
  c.beginPath(); c.moveTo(8,-10); c.lineTo(16,-26); c.stroke();

  // ── FORKS (long travel) ──
  c.strokeStyle='#ccc'; c.lineWidth=5;
  c.beginPath(); c.moveTo(52,-38); c.lineTo(73,-3); c.stroke();
  c.beginPath(); c.moveTo(56,-38); c.lineTo(77,-3); c.stroke();
  // Fork guard (red)
  c.fillStyle='#E31B23';
  c.beginPath(); c.moveTo(52,-32); c.lineTo(58,-32); c.lineTo(76,-6); c.lineTo(70,-6); c.closePath(); c.fill();
  // Fork brace
  c.strokeStyle='#aaa'; c.lineWidth=2.5;
  c.beginPath(); c.moveTo(53,-18); c.lineTo(76,-18); c.stroke();

  // ── ENGINE (black) ──
  c.fillStyle='#1e1e1e';
  c.beginPath();
  c.moveTo(20,-16); c.lineTo(18,-32); c.lineTo(38,-34); c.lineTo(44,-16);
  c.closePath(); c.fill();
  // Engine fins
  c.strokeStyle='#2e2e2e'; c.lineWidth=1.5;
  for(var i=0;i<5;i++){
    c.beginPath(); c.moveTo(20,-18-i*3); c.lineTo(43,-18-i*3); c.stroke();
  }
  // Engine bottom (crankcase)
  c.fillStyle='#252525';
  c.beginPath(); c.roundRect(18,-16,28,10,2); c.fill();

  // ── EXHAUST (right side, high mount) ──
  c.strokeStyle='#888'; c.lineWidth=5;
  c.beginPath(); c.moveTo(42,-14); c.bezierCurveTo(50,-10,58,-4,62,2); c.stroke();
  c.strokeStyle='#999'; c.lineWidth=5;
  c.beginPath(); c.moveTo(62,2); c.lineTo(76,4); c.stroke();
  // Muffler (round, silver)
  c.fillStyle='#777';
  c.beginPath(); c.roundRect(70,-2,18,10,4); c.fill();
  c.fillStyle='#555'; c.beginPath(); c.arc(88,3,4,0,Math.PI*2); c.fill();
  // Heat shield
  c.fillStyle='rgba(200,200,200,0.15)';
  c.beginPath(); c.roundRect(68,-3,16,8,3); c.fill();

  // ── RED SIDE PANEL (big graphic) ──
  c.fillStyle='#D41820';
  c.beginPath();
  c.moveTo(14,-32); c.lineTo(42,-36); c.lineTo(50,-24); c.lineTo(46,-14); c.lineTo(18,-12);
  c.closePath(); c.fill();
  // Graphic lightning stripe (white)
  c.fillStyle='rgba(255,255,255,0.25)';
  c.beginPath();
  c.moveTo(28,-34); c.lineTo(36,-35); c.lineTo(42,-24); c.lineTo(34,-24);
  c.closePath(); c.fill();

  // ── WHITE LOWER PANEL ──
  c.fillStyle='#e8e8e8';
  c.beginPath();
  c.moveTo(18,-12); c.lineTo(46,-14); c.lineTo(48,-8); c.lineTo(20,-6);
  c.closePath(); c.fill();
  // Honda text (simulated)
  c.fillStyle='#E31B23';
  c.font='bold 5px Arial';
  c.textAlign='center';
  c.fillText('HONDA',33,-9);

  // ── TANK (red, prominent) ──
  c.fillStyle='#D41820';
  c.beginPath();
  c.moveTo(14,-32); c.lineTo(42,-38); c.lineTo(56,-36); c.lineTo(54,-26); c.lineTo(16,-26);
  c.closePath(); c.fill();
  // Tank highlight
  c.fillStyle='rgba(255,100,100,0.3)';
  c.beginPath();
  c.moveTo(20,-36); c.lineTo(40,-38); c.lineTo(50,-32); c.lineTo(22,-30);
  c.closePath(); c.fill();
  // Tank cap
  c.fillStyle='#888';
  c.beginPath(); c.arc(30,-35,3,0,Math.PI*2); c.fill();

  // ── SEAT (black) ──
  c.fillStyle='#111';
  c.beginPath();
  c.moveTo(-12,-24); c.lineTo(14,-38); c.lineTo(16,-30); c.lineTo(-10,-22);
  c.closePath(); c.fill();
  // Seat grip texture
  c.fillStyle='rgba(255,255,255,0.05)';
  for(var i=0;i<4;i++){
    c.fillRect(-8+i*5,-30,3,6);
  }

  // ── REAR FENDER (tall, red) ──
  c.fillStyle='#D41820';
  c.beginPath();
  c.moveTo(-10,-22); c.lineTo(-2,-38); c.lineTo(4,-38); c.lineTo(-4,-20);
  c.closePath(); c.fill();
  // Rear fender tip
  c.beginPath(); c.moveTo(-2,-38); c.lineTo(2,-42); c.lineTo(4,-38); c.closePath(); c.fill();

  // ── HEADLIGHT AREA ──
  // Shroud (red)
  c.fillStyle='#D41820';
  c.beginPath();
  c.moveTo(50,-26); c.lineTo(68,-28); c.lineTo(72,-18); c.lineTo(66,-12); c.lineTo(52,-14);
  c.closePath(); c.fill();
  // Headlight (round)
  c.fillStyle='#1a1a1a';
  c.beginPath(); c.arc(60,-20,7,0,Math.PI*2); c.fill();
  c.fillStyle='rgba(255,220,100,0.9)';
  c.beginPath(); c.arc(60,-20,5,0,Math.PI*2); c.fill();
  // Lens shine
  c.fillStyle='rgba(255,255,255,0.4)';
  c.beginPath(); c.arc(58,-22,2,0,Math.PI*2); c.fill();

  // ── FRONT FENDER (high, red) ──
  c.fillStyle='#D41820';
  c.save(); c.translate(73,-16);
  c.beginPath(); c.moveTo(-6,4); c.lineTo(-4,-12); c.lineTo(4,-12); c.lineTo(6,4); c.closePath(); c.fill();
  c.restore();

  // ── HANDLEBAR (high, wide) ──
  c.strokeStyle='#999'; c.lineWidth=3.5;
  c.beginPath(); c.moveTo(54,-40); c.lineTo(52,-52); c.stroke();
  c.strokeStyle='#888'; c.lineWidth=5;
  c.beginPath(); c.moveTo(40,-52); c.lineTo(64,-52); c.stroke();
  // Crossbar
  c.strokeStyle='#777'; c.lineWidth=2;
  c.beginPath(); c.moveTo(44,-52); c.lineTo(60,-52); c.stroke();
  // Grips
  c.strokeStyle='#111'; c.lineWidth=7;
  c.beginPath(); c.moveTo(40,-52); c.lineTo(43,-52); c.stroke();
  c.beginPath(); c.moveTo(61,-52); c.lineTo(64,-52); c.stroke();
  // Brake/throttle
  c.strokeStyle='#555'; c.lineWidth=2;
  c.beginPath(); c.moveTo(42,-52); c.lineTo(50,-46); c.stroke();

  // ── FOOTPEGS ──
  c.strokeStyle='#666'; c.lineWidth=3;
  c.beginPath(); c.moveTo(22,-6); c.lineTo(30,-6); c.stroke();
  c.beginPath(); c.moveTo(44,-6); c.lineTo(52,-6); c.stroke();

  // ── EXHAUST SMOKE when wheelie ──
  if (angle < -0.35) {
    var ii = Math.min((-angle-0.35)/0.5, 1);
    for(var s=0;s<3;s++){
      c.save(); c.globalAlpha=ii*0.2*(1-s*0.3);
      c.fillStyle='#ccc';
      c.beginPath(); c.arc((90+s*10)/S+Math.sin(Date.now()*.008+s)*3, (s*4)/S, (4+s*3)/S, 0, Math.PI*2);
      c.fill(); c.restore();
    }
  }

  c.restore(); // undo scale

  // ── RIDER ──
  drawRider(c, t);
}

function drawWheel(c, x, y, r, t) {
  c.save(); c.translate(x, y);
  // Outer tire (thick knobby, very dark)
  c.strokeStyle='#0d0d0d'; c.lineWidth=10;
  c.beginPath(); c.arc(0,0,r,0,Math.PI*2); c.stroke();
  // Knob pattern
  var nk = 16;
  for(var i=0;i<nk;i++){
    var a = (i/nk)*Math.PI*2 + t*0.004;
    c.strokeStyle = (i%2===0)?'#181818':'#141414';
    c.lineWidth=5;
    c.beginPath();
    c.moveTo(Math.cos(a)*(r-5), Math.sin(a)*(r-5));
    c.lineTo(Math.cos(a)*(r+1), Math.sin(a)*(r+1));
    c.stroke();
  }
  // Tire inner edge
  c.strokeStyle='#222'; c.lineWidth=1.5;
  c.beginPath(); c.arc(0,0,r-6,0,Math.PI*2); c.stroke();
  // Rim (silver, narrow — enduro style)
  c.strokeStyle='#c8c8c8'; c.lineWidth=2.5;
  c.beginPath(); c.arc(0,0,r-8,0,Math.PI*2); c.stroke();
  // Many thin spokes
  var ns = 22;
  for(var i=0;i<ns;i++){
    var a = (i/ns)*Math.PI*2 + t*0.004;
    // Alternate spoke color for cross-lace look
    c.strokeStyle = (i%2===0) ? 'rgba(200,200,200,0.7)' : 'rgba(160,160,160,0.5)';
    c.lineWidth=0.8;
    c.beginPath(); c.moveTo(0,0);
    c.lineTo(Math.cos(a)*(r-8), Math.sin(a)*(r-8));
    c.stroke();
  }
  // Hub plate (silver circle)
  c.fillStyle='#b0b0b0'; c.beginPath(); c.arc(0,0,6,0,Math.PI*2); c.fill();
  c.fillStyle='#666';    c.beginPath(); c.arc(0,0,3,0,Math.PI*2); c.fill();
  // Disc brake (front wheel only, faint red tint)
  if (x > 50) {
    c.strokeStyle='rgba(200,50,50,0.3)'; c.lineWidth=4;
    c.beginPath(); c.arc(0,0,r-12,0,Math.PI*2); c.stroke();
  }
  c.restore();
}

function drawRider(c, t) {
  // Rider scaled with moto
  c.save();
  c.scale(S, S);
  c.translate(4, -40);

  // Boots (MX style, tall)
  c.fillStyle='#1a1a1a';
  c.beginPath(); c.roundRect(-4,2,9,9,1); c.fill();
  c.beginPath(); c.roundRect(14,2,9,9,1); c.fill();
  // Boot strap highlight
  c.fillStyle='rgba(255,255,255,0.1)';
  c.fillRect(-3,4,7,2); c.fillRect(15,4,7,2);

  // Legs (riding pants)
  c.strokeStyle='#1a1a1a'; c.lineWidth=9;
  c.beginPath(); c.moveTo(0,2); c.lineTo(2,-14); c.stroke();
  c.beginPath(); c.moveTo(18,2); c.lineTo(16,-14); c.stroke();
  // Knee guards
  c.fillStyle='#333';
  c.beginPath(); c.roundRect(-2,-10,8,6,2); c.fill();
  c.beginPath(); c.roundRect(14,-10,8,6,2); c.fill();

  // Body / jersey
  c.fillStyle='#111';
  c.beginPath(); c.roundRect(-7,-30,22,18,3); c.fill();
  // Jersey number plate (white)
  c.fillStyle='rgba(255,255,255,0.15)';
  c.beginPath(); c.roundRect(-2,-26,12,10,2); c.fill();

  // Arms to bar
  c.strokeStyle='#111'; c.lineWidth=7;
  c.beginPath(); c.moveTo(12,-22); c.lineTo(24,-18); c.stroke();
  c.beginPath(); c.moveTo(-3,-22); c.lineTo(8,-18); c.stroke();

  // Neck brace (black collar)
  c.fillStyle='#222';
  c.beginPath(); c.roundRect(-4,-32,16,5,2); c.fill();

  // Helmet (full face MX — red)
  c.fillStyle='#D41820';
  c.beginPath(); c.arc(5,-38,12,0,Math.PI*2); c.fill();
  // Helmet peak
  c.fillStyle='#B01018';
  c.beginPath(); c.moveTo(-6,-42); c.lineTo(16,-42); c.lineTo(14,-46); c.lineTo(-4,-46); c.closePath(); c.fill();
  // Visor
  c.fillStyle='rgba(0,0,0,0.8)';
  c.beginPath(); c.moveTo(-5,-32); c.lineTo(15,-32); c.lineTo(14,-38); c.lineTo(-4,-38); c.closePath(); c.fill();
  // Goggle strap
  c.strokeStyle='rgba(255,255,255,0.2)'; c.lineWidth=2;
  c.beginPath(); c.moveTo(-7,-40); c.lineTo(17,-40); c.stroke();
  // Visor tint shine
  c.fillStyle='rgba(100,150,255,0.15)';
  c.beginPath(); c.moveTo(-3,-37); c.lineTo(8,-37); c.lineTo(8,-34); c.lineTo(-3,-34); c.closePath(); c.fill();

  c.restore();
}
