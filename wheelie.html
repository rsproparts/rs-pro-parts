<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Wheelie · RS Pro Parts</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;overflow:hidden;height:100dvh;font-family:'Barlow Condensed',sans-serif;color:white;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;}
canvas{position:fixed;top:0;left:0;}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0a;z-index:30;gap:0;}
.screen.off{display:none;}
.logo{height:50px;object-fit:contain;margin-bottom:16px;}
.gtitle{font-family:'Bebas Neue';font-size:80px;line-height:.9;letter-spacing:3px;}
.red{color:#E31B23;}
.gsub{font-size:14px;color:rgba(255,255,255,.35);letter-spacing:.25em;text-transform:uppercase;margin-top:8px;}
.bigbtn{margin-top:24px;background:#E31B23;color:white;font-family:'Bebas Neue';font-size:30px;letter-spacing:3px;padding:14px 52px;border:none;cursor:pointer;clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);}
.bigbtn:active{opacity:.8;}
.hint{margin-top:16px;font-size:12px;color:rgba(255,255,255,.25);letter-spacing:.15em;text-transform:uppercase;text-align:center;line-height:2.2;}
#hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:10px 16px;z-index:50;pointer-events:none;}
.hval{font-family:'Bebas Neue';font-size:40px;line-height:1;}
.hlbl{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:.15em;text-transform:uppercase;}
#wbwrap{position:fixed;right:10px;top:50%;transform:translateY(-50%);width:8px;height:150px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;z-index:50;}
#wbar{position:absolute;bottom:0;width:100%;height:0%;background:#E31B23;border-radius:99px;}
/* Touch zones — high z-index, cover bottom half */
#zl{position:fixed;left:0;bottom:0;width:50%;height:45%;z-index:100;background:transparent;-webkit-tap-highlight-color:transparent;}
#zr{position:fixed;right:0;bottom:0;width:50%;height:45%;z-index:100;background:transparent;-webkit-tap-highlight-color:transparent;}
.zlbl{position:fixed;bottom:16px;font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;z-index:101;pointer-events:none;}
#zlbl-l{left:0;width:50%;text-align:center;color:rgba(255,255,255,.25);}
#zlbl-r{right:0;width:50%;text-align:center;color:rgba(227,27,35,.5);}
#flash{position:fixed;inset:0;background:#E31B23;opacity:0;pointer-events:none;z-index:200;}
.srow{display:flex;gap:28px;margin:8px 0 20px;}
.sitem .n{font-family:'Bebas Neue';font-size:40px;}
.sitem .l{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.15em;text-transform:uppercase;}
#dbg{position:fixed;top:60px;left:10px;font-size:11px;color:rgba(255,255,255,.3);z-index:999;pointer-events:none;}
</style>
</head>
<body>

<canvas id="c"></canvas>

<!-- START -->
<div id="start-screen" class="screen">
  <img class="logo" src="https://res.cloudinary.com/ddozrdmok/image/upload/v1776258543/Logo_rama_1_uuvrq1.png"/>
  <div class="gtitle">WHEE<span class="red">LIE</span></div>
  <div class="gsub">RS Pro Parts · Arcade</div>
  <button class="bigbtn" id="btn-jugar">JUGAR</button>
  <div class="hint">← FRENO &nbsp;|&nbsp; ACELERADOR →<br/>Teclado: ← A &nbsp;|&nbsp; → D</div>
</div>

<!-- GAME OVER -->
<div id="score-screen" class="screen off">
  <div class="gtitle">GAME <span class="red">OVER</span></div>
  <div style="margin-top:16px;font-size:12px;color:rgba(255,255,255,.3);letter-spacing:.2em;text-transform:uppercase;">Puntaje</div>
  <div style="font-family:'Bebas Neue';font-size:90px;color:#E31B23;line-height:1;" id="fs-score">0</div>
  <div class="srow">
    <div class="sitem"><div class="n" id="fs-dist">0m</div><div class="l">Distancia</div></div>
    <div class="sitem"><div class="n" id="fs-best">0</div><div class="l">Mejor</div></div>
    <div class="sitem"><div class="n" id="fs-wc">0</div><div class="l">Wheelies</div></div>
  </div>
  <button class="bigbtn" id="btn-denovo">DE NUEVO</button>
  <button id="btn-menu" style="margin-top:12px;background:transparent;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.4);font-family:'Barlow Condensed';font-size:14px;letter-spacing:.15em;text-transform:uppercase;padding:10px 28px;cursor:pointer;">MENÚ</button>
</div>

<!-- HUD -->
<div id="hud">
  <div><div class="hlbl">Score</div><div class="hval red" id="h-score">0</div></div>
  <div style="text-align:center"><div class="hlbl">Wheelie</div><div class="hval" id="h-wt">0s</div></div>
  <div style="text-align:right"><div class="hlbl">Mejor</div><div class="hval" id="h-best">0</div></div>
</div>
<div id="wbwrap"><div id="wbar"></div></div>

<!-- TOUCH ZONES -->
<div id="zl"></div>
<div id="zr"></div>
<div class="zlbl" id="zlbl-l">⬇ FRENO</div>
<div class="zlbl" id="zlbl-r">ACELERADOR ⬆</div>

<div id="flash"></div>
<div id="dbg"></div>

<script>
// ── GLOBALS ──
var CV = document.getElementById('c');
var CX = CV.getContext('2d');
var W, H, GY;
var raf, gameOn = false;
var accel = false, brake = false;
var bestScore = 0;
var M = {}, camX = 0, scoreF = 0, score = 0;
var wCount = 0, wOn = false, wTime = 0;
var parts = [], marks = [], obs = [], spT = 0;
var RED = '#E31B23';
var WB = 76; // wheelbase

function resize() {
  W = CV.width = window.innerWidth;
  H = CV.height = window.innerHeight;
  GY = Math.floor(H * 0.70);
}

// ── BUTTONS (inline onclick — guaranteed to work) ──
document.getElementById('btn-jugar').onclick = function() { startGame(); };
document.getElementById('btn-denovo').onclick = function() { startGame(); };
document.getElementById('btn-menu').onclick = function() { showStart(); };

// ── TOUCH ZONES ──
var zl = document.getElementById('zl');
var zr = document.getElementById('zr');

zl.ontouchstart = function(e) { e.preventDefault(); brake = true; document.getElementById('dbg').textContent = 'BRAKE ON'; };
zl.ontouchend   = function(e) { e.preventDefault(); brake = false; document.getElementById('dbg').textContent = 'BRAKE OFF'; };
zl.ontouchcancel= function(e) { e.preventDefault(); brake = false; };
zr.ontouchstart = function(e) { e.preventDefault(); accel = true; document.getElementById('dbg').textContent = 'ACCEL ON'; };
zr.ontouchend   = function(e) { e.preventDefault(); accel = false; document.getElementById('dbg').textContent = 'ACCEL OFF'; };
zr.ontouchcancel= function(e) { e.preventDefault(); accel = false; };

// Mouse fallback
zl.onmousedown  = function() { brake = true; };
zl.onmouseup    = function() { brake = false; };
zl.onmouseleave = function() { brake = false; };
zr.onmousedown  = function() { accel = true; };
zr.onmouseup    = function() { accel = false; };
zr.onmouseleave = function() { accel = false; };

// Keyboard
document.onkeydown = function(e) {
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') { e.preventDefault(); brake = true; }
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { e.preventDefault(); accel = true; }
};
document.onkeyup = function(e) {
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') brake = false;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') accel = false;
};

function showStart() {
  document.getElementById('start-screen').classList.remove('off');
  document.getElementById('score-screen').classList.add('off');
  gameOn = false;
  if (raf) cancelAnimationFrame(raf);
}

function startGame() {
  document.getElementById('start-screen').classList.add('off');
  document.getElementById('score-screen').classList.add('off');
  resize();
  M = { angle: 0, angVel: 0, speed: 2.5 };
  camX = 0; scoreF = 0; score = 0;
  wCount = 0; wOn = false; wTime = 0;
  parts = []; obs = []; spT = 0;
  accel = false; brake = false;
  marks = [];
  for (var i = 0; i < 80; i++) marks.push(i * 110);
  gameOn = true;
  if (raf) cancelAnimationFrame(raf);
  loop();
}

function loop() {
  raf = requestAnimationFrame(loop);
  update();
  render();
}

// ── PHYSICS ──
var G_ANG  = 0.016;
var AC_POW = 0.044;
var BR_POW = 0.052;
var DAMP   = 0.87;
var CRASH  = 1.05;
var STABLE = 0.06;

function update() {
  if (!gameOn) return;
  M.speed = Math.min(M.speed + 0.006, 7);
  camX += M.speed;

  if (accel) M.angVel -= AC_POW;
  if (brake) M.angVel += BR_POW;

  if (M.angle < -STABLE) {
    M.angVel += G_ANG; // gravity brings nose down
  } else if (M.angle > STABLE) {
    M.angVel -= G_ANG * 0.8;
  } else {
    if (!accel && !brake) {
      M.angVel *= 0.55;
      if (Math.abs(M.angle) < 0.015) { M.angle = 0; M.angVel = 0; }
    }
  }

  M.angVel *= DAMP;
  M.angle  += M.angVel;

  // Ground hard limit: can't go past flat on brake side
  if (M.angle > 0) { M.angle = 0; M.angVel = Math.min(0, M.angVel); }
  M.angle = Math.max(-(CRASH + 0.05), M.angle);

  // Wheelie
  var inW = M.angle < -0.30;
  if (inW) { wTime += 1/60; scoreF += M.speed * 0.6; wOn = true; }
  else { if (wOn && wTime > 0.4) wCount++; wOn = false; wTime = Math.max(0, wTime - 0.01); }

  // Bar
  var bp = Math.max(0, Math.min(100, (-M.angle / CRASH) * 100));
  var wb = document.getElementById('wbar');
  wb.style.height = bp + '%';
  wb.style.background = bp > 80 ? '#ff3333' : bp > 55 ? '#ff8800' : RED;

  // Crash
  if (Math.abs(M.angle) > CRASH) { crash(); return; }

  scoreF += M.speed * 0.04;
  score = Math.floor(scoreF);
  if (score > bestScore) bestScore = score;
  document.getElementById('h-score').textContent = score;
  document.getElementById('h-wt').textContent = wTime.toFixed(1) + 's';
  document.getElementById('h-best').textContent = bestScore;

  // Obstacles
  spT++;
  if (spT > 130 + Math.random() * 90) {
    spT = 0;
    obs.push({ x: camX + W + 60 + Math.random() * 120, type: Math.random() < 0.6 ? 'cone' : 'bump', hit: false });
  }
  obs = obs.filter(function(o) { return o.x > camX - 100; });
  var mx = W * 0.28;
  obs.forEach(function(o) {
    var sx = mx + (o.x - camX);
    if (!o.hit && sx > mx - 20 && sx < mx + 35) {
      if (o.type === 'cone' && M.angle > -0.4) { crash(); }
      else if (o.type === 'bump') { scoreF += 30; }
      o.hit = true;
    }
  });

  // Particles
  if (inW && Math.random() < 0.5) {
    parts.push({ x: W * 0.28 - 30, y: GY, vx: -Math.random() * 2 - 0.5, vy: -Math.random() * 2, life: 1, r: 2 + Math.random() * 3 });
  }
  parts.forEach(function(p) { p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life -= 0.04; });
  parts = parts.filter(function(p) { return p.life > 0; });

  marks.forEach(function(m, i) { if (m - camX < -60) marks[i] += 80 * 110; });
}

function crash() {
  if (!gameOn) return;
  gameOn = false; accel = false; brake = false;
  var fl = document.getElementById('flash');
  fl.style.transition = 'none'; fl.style.opacity = '0.7';
  setTimeout(function() { fl.style.transition = 'opacity .3s'; fl.style.opacity = '0'; }, 80);
  if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
  setTimeout(function() {
    document.getElementById('fs-score').textContent = score;
    document.getElementById('fs-dist').textContent  = Math.floor(camX / 40) + 'm';
    document.getElementById('fs-best').textContent  = bestScore;
    document.getElementById('fs-wc').textContent    = wCount;
    document.getElementById('score-screen').classList.remove('off');
  }, 700);
}

// ── RENDER ──
function render() {
  CX.clearRect(0, 0, W, H);
  var t = Date.now();

  // Sky
  var sk = CX.createLinearGradient(0, 0, 0, GY);
  sk.addColorStop(0, '#060606'); sk.addColorStop(1, '#140508');
  CX.fillStyle = sk; CX.fillRect(0, 0, W, GY);

  // Buildings
  var blds = [{x:0,w:55,h:85},{x:70,w:35,h:120},{x:130,w:70,h:65},{x:215,w:45,h:100},{x:275,w:60,h:80},{x:355,w:80,h:110},{x:455,w:50,h:70}];
  var off = (camX * 0.12) % W;
  CX.fillStyle = '#0e0e0e';
  blds.forEach(function(b) {
    for (var r = -1; r <= 1; r++) {
      var bx = (b.x - off + r * W + W * 2) % (W * 2) - 80;
      CX.fillRect(bx, GY - b.h, b.w, b.h);
    }
  });

  // Ground
  CX.fillStyle = '#181818'; CX.fillRect(0, GY, W, H - GY);
  CX.strokeStyle = RED; CX.lineWidth = 2;
  CX.beginPath(); CX.moveTo(0, GY); CX.lineTo(W, GY); CX.stroke();
  var gg = CX.createLinearGradient(0, GY, 0, GY + 20);
  gg.addColorStop(0, 'rgba(227,27,35,.1)'); gg.addColorStop(1, 'rgba(0,0,0,0)');
  CX.fillStyle = gg; CX.fillRect(0, GY, W, 20);

  // Road marks
  CX.fillStyle = 'rgba(255,255,255,.07)';
  marks.forEach(function(m) { var sx = m - camX; if (sx > -50 && sx < W + 10) CX.fillRect(sx, GY + 14, 36, 5); });

  // Obstacles
  var mx = W * 0.28;
  obs.forEach(function(o) {
    var ox = mx + (o.x - camX);
    if (ox < -60 || ox > W + 60) return;
    CX.save(); CX.translate(ox, GY);
    if (o.type === 'cone') {
      CX.fillStyle = RED; CX.beginPath(); CX.moveTo(0, 0); CX.lineTo(-10, -30); CX.lineTo(10, -30); CX.closePath(); CX.fill();
      CX.fillStyle = 'white'; CX.fillRect(-8, -17, 16, 4);
    } else {
      CX.fillStyle = '#2a2a2a'; CX.beginPath(); CX.ellipse(0, -3, 18, 7, 0, 0, Math.PI * 2); CX.fill();
    }
    CX.restore();
  });

  // Particles
  parts.forEach(function(p) {
    CX.save(); CX.globalAlpha = p.life * 0.5; CX.fillStyle = '#aaa';
    CX.beginPath(); CX.arc(p.x, p.y, p.r, 0, Math.PI * 2); CX.fill(); CX.restore();
  });

  // Speed lines
  if (M.speed > 5) {
    CX.save(); CX.globalAlpha = (M.speed - 5) / 7 * 0.1; CX.strokeStyle = 'white'; CX.lineWidth = 1;
    for (var i = 0; i < 8; i++) {
      var y = (i / 8) * GY; var l = 50 + Math.random() * 80;
      CX.beginPath(); CX.moveTo(W * 0.6, y); CX.lineTo(W * 0.6 + l, y); CX.stroke();
    }
    CX.restore();
  }

  // MOTO — origin at rear axle on ground
  CX.save();
  CX.translate(mx, GY);
  CX.rotate(M.angle);
  drawMoto(t);
  CX.restore();
}

function drawMoto(t) {
  // ── WHEELS ──
  wheel(0, 0, 22, t);     // rear
  wheel(WB, 0, 21, t);    // front

  // Swingarm
  CX.strokeStyle='#777'; CX.lineWidth=5;
  CX.beginPath(); CX.moveTo(0,-4); CX.lineTo(18,-26); CX.stroke();

  // Frame
  CX.strokeStyle='#888'; CX.lineWidth=4;
  CX.beginPath(); CX.moveTo(18,-26); CX.lineTo(38,-20); CX.stroke();
  CX.beginPath(); CX.moveTo(18,-26); CX.lineTo(60,-46); CX.stroke();
  CX.beginPath(); CX.moveTo(38,-20); CX.lineTo(60,-46); CX.stroke();
  CX.strokeStyle='#666'; CX.lineWidth=3;
  CX.beginPath(); CX.moveTo(18,-26); CX.lineTo(-2,-40); CX.lineTo(-12,-30); CX.stroke();

  // Forks
  CX.strokeStyle='#bbb'; CX.lineWidth=5;
  CX.beginPath(); CX.moveTo(56,-44); CX.lineTo(WB-2,-4); CX.stroke();
  CX.beginPath(); CX.moveTo(60,-44); CX.lineTo(WB+2,-4); CX.stroke();
  CX.strokeStyle='#999'; CX.lineWidth=3;
  CX.beginPath(); CX.moveTo(57,-22); CX.lineTo(WB+1,-22); CX.stroke();

  // Engine
  CX.fillStyle='#252525';
  CX.beginPath(); CX.moveTo(22,-20); CX.lineTo(20,-36); CX.lineTo(42,-38); CX.lineTo(48,-20); CX.closePath(); CX.fill();
  CX.strokeStyle='#3a3a3a'; CX.lineWidth=1.5;
  for (var i=0;i<4;i++) { CX.beginPath(); CX.moveTo(23,-22-i*3.5); CX.lineTo(46,-22-i*3.5); CX.stroke(); }

  // Exhaust
  CX.strokeStyle='#777'; CX.lineWidth=5;
  CX.beginPath(); CX.moveTo(44,-18); CX.bezierCurveTo(56,-14,68,-8,72,-2); CX.stroke();
  CX.fillStyle='#555'; CX.beginPath(); CX.roundRect(66,-5,22,9,3); CX.fill();

  // Red panels
  CX.fillStyle=RED;
  CX.beginPath(); CX.moveTo(18,-36); CX.lineTo(46,-40); CX.lineTo(53,-26); CX.lineTo(50,-16); CX.lineTo(22,-14); CX.closePath(); CX.fill();

  // White lower
  CX.fillStyle='#ddd';
  CX.beginPath(); CX.moveTo(22,-14); CX.lineTo(50,-16); CX.lineTo(52,-10); CX.lineTo(24,-8); CX.closePath(); CX.fill();

  // Tank
  CX.fillStyle=RED;
  CX.beginPath(); CX.moveTo(16,-36); CX.lineTo(46,-42); CX.lineTo(60,-40); CX.lineTo(58,-28); CX.lineTo(18,-28); CX.closePath(); CX.fill();
  CX.fillStyle='rgba(255,255,255,.1)';
  CX.beginPath(); CX.moveTo(24,-38); CX.lineTo(46,-42); CX.lineTo(56,-36); CX.lineTo(26,-32); CX.closePath(); CX.fill();

  // Seat
  CX.fillStyle='#1a1a1a';
  CX.beginPath(); CX.moveTo(-14,-30); CX.lineTo(18,-44); CX.lineTo(18,-34); CX.lineTo(-12,-28); CX.closePath(); CX.fill();

  // Rear fender
  CX.fillStyle=RED;
  CX.beginPath(); CX.moveTo(-12,-28); CX.lineTo(-4,-44); CX.lineTo(0,-44); CX.lineTo(-6,-26); CX.closePath(); CX.fill();

  // Headlight shroud
  CX.fillStyle=RED;
  CX.beginPath(); CX.moveTo(54,-30); CX.lineTo(72,-32); CX.lineTo(76,-22); CX.lineTo(70,-16); CX.lineTo(56,-18); CX.closePath(); CX.fill();
  CX.fillStyle='#222'; CX.beginPath(); CX.arc(65,-24,7,0,Math.PI*2); CX.fill();
  CX.fillStyle='rgba(255,220,120,.9)'; CX.beginPath(); CX.arc(65,-24,5,0,Math.PI*2); CX.fill();

  // Front fender
  CX.fillStyle=RED;
  CX.save(); CX.translate(WB,-20);
  CX.beginPath(); CX.moveTo(-8,2); CX.lineTo(-6,-14); CX.lineTo(6,-14); CX.lineTo(8,2); CX.closePath(); CX.fill();
  CX.restore();

  // Handlebar
  CX.strokeStyle='#999'; CX.lineWidth=4;
  CX.beginPath(); CX.moveTo(58,-46); CX.lineTo(56,-58); CX.stroke();
  CX.lineWidth=5; CX.beginPath(); CX.moveTo(42,-58); CX.lineTo(70,-58); CX.stroke();
  CX.strokeStyle='#222'; CX.lineWidth=7;
  CX.beginPath(); CX.moveTo(42,-58); CX.lineTo(46,-58); CX.stroke();
  CX.beginPath(); CX.moveTo(66,-58); CX.lineTo(70,-58); CX.stroke();

  // Smoke
  if (M.angle < -0.35) {
    var ii = Math.min((-M.angle - 0.35) / 0.5, 1);
    for (var s=0;s<3;s++) {
      CX.save(); CX.globalAlpha=ii*0.22*(1-s*.3); CX.fillStyle='#aaa';
      CX.beginPath(); CX.arc(90+s*9+Math.sin(t*.008+s)*4,s*4,4+s*3,0,Math.PI*2); CX.fill(); CX.restore();
    }
  }

  rider(t);
}

function wheel(x, y, r, t) {
  CX.save(); CX.translate(x, y);
  CX.strokeStyle='#111'; CX.lineWidth=11;
  CX.beginPath(); CX.arc(0,0,r,0,Math.PI*2); CX.stroke();
  for (var i=0;i<14;i++) {
    var a=(i/14)*Math.PI*2+t*.005;
    CX.strokeStyle='#1e1e1e'; CX.lineWidth=4;
    CX.beginPath(); CX.moveTo(Math.cos(a)*(r-4),Math.sin(a)*(r-4)); CX.lineTo(Math.cos(a)*(r+2),Math.sin(a)*(r+2)); CX.stroke();
  }
  CX.strokeStyle='#2a2a2a'; CX.lineWidth=2; CX.beginPath(); CX.arc(0,0,r-5,0,Math.PI*2); CX.stroke();
  CX.strokeStyle='#c0c0c0'; CX.lineWidth=2; CX.beginPath(); CX.arc(0,0,r-7,0,Math.PI*2); CX.stroke();
  CX.strokeStyle='#aaa'; CX.lineWidth=.8;
  for (var i=0;i<20;i++) {
    var a=(i/20)*Math.PI*2+t*.005;
    CX.beginPath(); CX.moveTo(0,0); CX.lineTo(Math.cos(a)*(r-7),Math.sin(a)*(r-7)); CX.stroke();
  }
  CX.fillStyle='#999'; CX.beginPath(); CX.arc(0,0,5,0,Math.PI*2); CX.fill();
  CX.fillStyle='#333'; CX.beginPath(); CX.arc(0,0,2.5,0,Math.PI*2); CX.fill();
  CX.restore();
}

function rider(t) {
  CX.save(); CX.translate(4,-46);
  CX.rotate(M.angle * 0.25);
  CX.fillStyle='#1a1a1a'; CX.fillRect(-4,2,9,7); CX.fillRect(12,2,9,7);
  CX.strokeStyle='#111'; CX.lineWidth=8;
  CX.beginPath(); CX.moveTo(0,2); CX.lineTo(0,-12); CX.stroke();
  CX.beginPath(); CX.moveTo(16,2); CX.lineTo(14,-12); CX.stroke();
