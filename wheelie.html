<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Wheelie · RS Pro Parts</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0a;font-family:'Barlow Condensed',sans-serif;color:white;overflow:hidden;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;}
canvas{display:block;touch-action:none;}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}

/* SCREENS */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0a;z-index:20;transition:opacity 0.3s;}
.screen.hidden{opacity:0;pointer-events:none;}

/* START SCREEN */
#start-screen{gap:0;}
.logo-area{text-align:center;margin-bottom:32px;}
.logo-area img{height:56px;object-fit:contain;filter:brightness(0) invert(1);}
.game-title{font-family:'Bebas Neue',sans-serif;font-size:72px;line-height:0.9;color:white;letter-spacing:2px;}
.game-title span{color:#E31B23;}
.subtitle{font-size:16px;color:rgba(255,255,255,0.4);letter-spacing:0.2em;text-transform:uppercase;margin-top:8px;}
.moto-preview{width:200px;height:auto;margin:28px 0;filter:drop-shadow(0 0 30px rgba(227,27,35,0.5));}
.btn-start{background:#E31B23;color:white;font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;padding:16px 48px;border:none;cursor:pointer;pointer-events:all;position:relative;overflow:hidden;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);}
.btn-start::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);transform:translateX(-100%);transition:transform 0.4s;}
.btn-start:hover::after{transform:translateX(100%);}
.btn-start:active{background:#c0151c;}
.how-to{margin-top:20px;font-size:13px;color:rgba(255,255,255,0.25);letter-spacing:0.15em;text-transform:uppercase;text-align:center;line-height:1.8;}

/* HUD */
#hud{position:fixed;top:0;left:0;width:100%;padding:12px 16px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;}
.hud-stat{text-align:center;}
.hud-label{font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:0.15em;text-transform:uppercase;display:block;}
.hud-value{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1;color:white;}
.hud-value.accent{color:#E31B23;}

/* WHEELIE METER */
#wheelie-bar-wrap{position:fixed;right:12px;top:50%;transform:translateY(-50%);width:10px;height:160px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden;}
#wheelie-bar{width:100%;height:0%;background:#E31B23;border-radius:99px;transition:height 0.05s;position:absolute;bottom:0;}
#wheelie-label{position:fixed;right:28px;top:50%;transform:translateY(-50%) rotate(-90deg);font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:0.15em;text-transform:uppercase;white-space:nowrap;}

/* COMBO */
#combo{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Bebas Neue',sans-serif;font-size:0px;color:#E31B23;pointer-events:none;opacity:0;transition:font-size 0.1s,opacity 0.3s;text-shadow:0 0 30px rgba(227,27,35,0.8);letter-spacing:4px;}

/* GAME OVER */
#gameover-screen{gap:12px;}
#gameover-screen .game-title{font-size:56px;}
.score-display{text-align:center;margin:16px 0;}
.score-display .big{font-family:'Bebas Neue',sans-serif;font-size:80px;color:#E31B23;line-height:1;}
.score-display .lbl{font-size:12px;color:rgba(255,255,255,0.3);letter-spacing:0.2em;text-transform:uppercase;}
.scores-row{display:flex;gap:32px;margin:8px 0 20px;}
.score-item{text-align:center;}
.score-item .n{font-family:'Bebas Neue',sans-serif;font-size:36px;color:white;line-height:1;}
.score-item .l{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:0.15em;text-transform:uppercase;}

/* TWO BUTTONS */
#btn-accel{position:fixed;bottom:0;right:0;width:50%;height:45%;background:rgba(227,27,35,0.04);z-index:5;touch-action:none;-webkit-tap-highlight-color:transparent;border-left:1px solid rgba(227,27,35,0.1);}
#btn-brake{position:fixed;bottom:0;left:0;width:50%;height:45%;background:rgba(255,255,255,0.02);z-index:5;touch-action:none;-webkit-tap-highlight-color:transparent;}
#btn-accel-label{position:fixed;bottom:20px;right:0;width:50%;text-align:center;font-size:11px;color:rgba(227,27,35,0.4);letter-spacing:0.2em;text-transform:uppercase;pointer-events:none;animation:pulse 2s infinite;}
#btn-brake-label{position:fixed;bottom:20px;left:0;width:50%;text-align:center;font-size:11px;color:rgba(255,255,255,0.2);letter-spacing:0.2em;text-transform:uppercase;pointer-events:none;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.8}}

/* GROUND FLASH */
#crash-flash{position:fixed;inset:0;background:#E31B23;opacity:0;pointer-events:none;z-index:15;}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="start-screen" class="screen">
  <div class="logo-area">
    <img src="https://res.cloudinary.com/ddozrdmok/image/upload/v1776258543/Logo_rama_1_uuvrq1.png" alt="RS Pro Parts"/>
  </div>
  <div class="game-title">WHEE<span>LIE</span></div>
  <div class="subtitle">RS Pro Parts · Arcade</div>
  <canvas id="preview-canvas" width="260" height="120" style="margin:24px 0;"></canvas>
  <button class="btn-start" onclick="startGame()">JUGAR</button>
  <div class="how-to">
    Mantené presionado para hacer wheelie<br/>
    Soltá antes de caer
  </div>
</div>

<!-- GAME OVER SCREEN -->
<div id="gameover-screen" class="screen hidden">
  <div class="game-title">GAME<span style="color:#E31B23"> OVER</span></div>
  <div class="score-display">
    <div class="lbl">Puntaje</div>
    <div class="big" id="final-score">0</div>
  </div>
  <div class="scores-row">
    <div class="score-item"><div class="n" id="final-dist">0m</div><div class="l">Distancia</div></div>
    <div class="score-item"><div class="n" id="final-best">0</div><div class="l">Mejor</div></div>
    <div class="score-item"><div class="n" id="final-wheelies">0</div><div class="l">Wheelies</div></div>
  </div>
  <button class="btn-start" onclick="startGame()">DE NUEVO</button>
  <button onclick="document.getElementById('gameover-screen').classList.add('hidden');document.getElementById('start-screen').classList.remove('hidden');" style="margin-top:12px;background:transparent;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.4);font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:0.15em;text-transform:uppercase;padding:10px 24px;cursor:pointer;pointer-events:all;">MENÚ</button>
</div>

<!-- GAME UI -->
<div id="ui">
  <div id="hud">
    <div class="hud-stat"><span class="hud-label">Score</span><span class="hud-value accent" id="hud-score">0</span></div>
    <div class="hud-stat" style="text-align:center;"><span class="hud-label">Wheelie</span><span class="hud-value" id="hud-wheelie">0m</span></div>
    <div class="hud-stat" style="text-align:right;"><span class="hud-label">Mejor</span><span class="hud-value" id="hud-best">0</span></div>
  </div>
  <div id="wheelie-label">WHEELIE</div>
  <div id="wheelie-bar-wrap"><div id="wheelie-bar"></div></div>
  <div id="combo"></div>
</div>

<!-- TWO BUTTONS -->
<div id="btn-accel"></div>
<div id="btn-brake"></div>
<div id="btn-accel-label">🔴 ACELERADOR</div>
<div id="btn-brake-label">FRENO ⬇</div>

<!-- CRASH FLASH -->
<div id="crash-flash"></div>

<!-- MAIN CANVAS -->
<canvas id="game-canvas"></canvas>

<script>
// ── CONSTANTS ──
const GROUND_Y_RATIO = 0.72;
const GRAVITY = 0.6;
const ACCEL = 0.18;
const MAX_SPEED = 8;
const WHEELIE_POWER = -0.9;
const WHEELIE_DAMPING = 0.92;
const CRASH_ANGLE = 1.1;
const RS_RED = '#E31B23';

// ── STATE ──
let canvas, ctx, W, H, GY;
let gameState = 'idle'; // idle, playing, dead
let accelerating = false, braking = false;
let score = 0, bestScore = 0, wheelieCount = 0;
let wheelieDist = 0, currentWheelieTime = 0;
let frameId;

// MOTO
let moto = {
  x: 0, y: 0,
  vx: 0, vy: 0,
  angle: 0, angVel: 0,
  speed: 0,
  wheelie: false,
  wheelieTime: 0,
  crashed: false
};

// WORLD
let camX = 0;
let groundY = 0;
let obstacles = [];
let particles = [];
let bgLayers = [];
let roadMarks = [];
let comboTimer = 0;
let comboMult = 1;
let scoreFloat = 0;

// ── INIT ──
function init() {
  canvas = document.getElementById('game-canvas');
  ctx = canvas.getContext('2d');
  resize();
  window.addEventListener('resize', resize);
  drawPreview();
  setupInput();
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  GY = H * GROUND_Y_RATIO;
}

// ── INPUT ──
function setupInput() {
  const accel = document.getElementById('btn-accel');
  const brake = document.getElementById('btn-brake');
  accel.addEventListener('touchstart', e => { e.preventDefault(); accelerating = true; }, {passive:false});
  accel.addEventListener('touchend', e => { e.preventDefault(); accelerating = false; }, {passive:false});
  accel.addEventListener('touchcancel', e => { e.preventDefault(); accelerating = false; }, {passive:false});
  brake.addEventListener('touchstart', e => { e.preventDefault(); braking = true; }, {passive:false});
  brake.addEventListener('touchend', e => { e.preventDefault(); braking = false; }, {passive:false});
  brake.addEventListener('touchcancel', e => { e.preventDefault(); braking = false; }, {passive:false});
  accel.addEventListener('mousedown', () => accelerating = true);
  accel.addEventListener('mouseup', () => accelerating = false);
  brake.addEventListener('mousedown', () => braking = true);
  brake.addEventListener('mouseup', () => braking = false);
  document.addEventListener('keydown', e => {
    if(e.code === 'ArrowRight') { e.preventDefault(); accelerating = true; }
    if(e.code === 'ArrowLeft') { e.preventDefault(); braking = true; }
  });
  document.addEventListener('keyup', e => {
    if(e.code === 'ArrowRight') accelerating = false;
    if(e.code === 'ArrowLeft') braking = false;
  });
}

// ── START ──
function startGame() {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('gameover-screen').classList.add('hidden');
  document.getElementById('hold-hint').style.opacity = '1';

  score = 0; wheelieCount = 0; wheelieDist = 0; scoreFloat = 0;
  camX = 0; obstacles = []; particles = []; comboMult = 1; comboTimer = 0;
  accelerating = false; braking = false;

  moto = {
    x: W * 0.25, y: GY,
    vx: 3, vy: 0,
    angle: 0, angVel: 0,
    speed: 3,
    wheelie: false,
    wheelieTime: 0,
    crashed: false
  };

  generateRoad();
  gameState = 'playing';
  if (frameId) cancelAnimationFrame(frameId);
  loop();
}

// ── ROAD ──
function generateRoad() {
  roadMarks = [];
  for (let i = 0; i < 40; i++) {
    roadMarks.push({ x: i * 120 });
  }
}

function spawnObstacle() {
  const types = ['cone', 'bump'];
  const type = types[Math.floor(Math.random() * types.length)];
  obstacles.push({
    x: camX + W + 100 + Math.random() * 200,
    type,
    hit: false
  });
}

// ── GAME LOOP ──
function loop() {
  frameId = requestAnimationFrame(loop);
  update();
  draw();
}

function update() {
  if (gameState !== 'playing') return;

  const m = moto;
  const onGround = m.y >= GY - 2 && Math.abs(m.angle) < 0.15;

  // Speed
  if (onGround) {
    m.speed = Math.min(m.speed + ACCEL, MAX_SPEED);
  }
  m.vx = m.speed;

  // Wheelie physics
  if (accelerating && onGround) {
    m.angVel += WHEELIE_POWER * 0.06; // nose up
    document.getElementById('btn-accel-label').style.opacity = '0';
    document.getElementById('btn-brake-label').style.opacity = '0';
  } else if (braking) {
    m.angVel += 0.12; // nose down fast
  } else {
    m.angVel += 0.035; // gravity brings nose down
  }

  m.angVel *= WHEELIE_DAMPING;
  m.angle += m.angVel;

  // Ground constraint
  if (m.y >= GY) {
    m.y = GY;
    m.vy = 0;
    if (m.angle > 0.05) {
      m.angVel -= m.angle * 0.1;
    }
  } else {
    m.vy += GRAVITY * 0.3;
  }

  m.y = Math.min(m.y + m.vy, GY);
  m.x += m.vx * 0.1; // small world movement, camera does the rest
  camX += m.vx;

  // Wheelie detection
  const isWheelied = m.angle < -0.25 && m.y >= GY - 4;
  if (isWheelied) {
    m.wheelieTime += 1/60;
    currentWheelieTime += 1/60;
    scoreFloat += m.speed * 0.8 * comboMult;

    // Wheelie bar
    const pct = Math.min(Math.abs(m.angle) / CRASH_ANGLE * 100, 100);
    document.getElementById('wheelie-bar').style.height = pct + '%';
    document.getElementById('wheelie-bar').style.background =
      pct > 75 ? '#ff4444' : pct > 50 ? '#ff8800' : RS_RED;
  } else {
    if (currentWheelieTime > 0.5) {
      wheelieCount++;
      comboMult = Math.min(comboMult + 0.5, 5);
      showCombo(comboMult);
    }
    currentWheelieTime = 0;
    document.getElementById('wheelie-bar').style.height = '0%';
  }

  // Crash detection
  if (m.angle > CRASH_ANGLE || m.angle < -CRASH_ANGLE) {
    crash();
    return;
  }

  // Score
  score = Math.floor(scoreFloat + camX * 0.05);
  if (score > bestScore) bestScore = score;
  document.getElementById('hud-score').textContent = score;
  document.getElementById('hud-wheelie').textContent = Math.floor(m.wheelieTime) + 's';
  document.getElementById('hud-best').textContent = bestScore;

  // Obstacles
  if (obstacles.length < 3 && Math.random() < 0.008) spawnObstacle();
  obstacles = obstacles.filter(o => o.x > camX - 200);
  obstacles.forEach(o => {
    if (!o.hit && Math.abs((o.x - camX) - (W * 0.25)) < 30) {
      if (o.type === 'bump') {
        moto.vy = -4;
        moto.y -= 5;
      } else {
        crash();
      }
    }
  });

  // Particles
  if (isWheelied && Math.random() < 0.4) {
    particles.push({
      x: W * 0.25 - 30,
      y: GY,
      vx: -Math.random() * 3 - 1,
      vy: -Math.random() * 3,
      life: 1,
      size: Math.random() * 4 + 2
    });
  }
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.05;
  });

  // Combo decay
  if (comboTimer > 0) comboTimer--;
  else if (!isWheelied) comboMult = Math.max(1, comboMult - 0.01);

  // Road marks recycling
  roadMarks.forEach(r => {
    if (r.x - camX < -60) r.x += 40 * 120;
  });
}

function crash() {
  if (gameState !== 'playing') return;
  gameState = 'dead';
  accelerating = false; braking = false;

  // Flash
  const flash = document.getElementById('crash-flash');
  flash.style.opacity = '0.6';
  setTimeout(() => { flash.style.opacity = '0'; }, 200);

  // Vibrate
  if (navigator.vibrate) navigator.vibrate([80, 40, 80]);

  setTimeout(() => {
    document.getElementById('final-score').textContent = score;
    document.getElementById('final-dist').textContent = Math.floor(camX / 50) + 'm';
    document.getElementById('final-best').textContent = bestScore;
    document.getElementById('final-wheelies').textContent = wheelieCount;
    document.getElementById('gameover-screen').classList.remove('hidden');
  }, 600);
}

function showCombo(mult) {
  const el = document.getElementById('combo');
  el.textContent = 'x' + mult.toFixed(1) + ' COMBO!';
  el.style.fontSize = '52px';
  el.style.opacity = '1';
  comboTimer = 60;
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.fontSize = '0px';
  }, 800);
}

// ── DRAW ──
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, GY);
  sky.addColorStop(0, '#0a0a0a');
  sky.addColorStop(1, '#1a0a0a');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, GY);

  // Background buildings
  drawBuildings();

  // Ground
  drawGround();

  // Road marks
  drawRoadMarks();

  // Obstacles
  drawObstacles();

  // Particles
  drawParticles();

  // Moto
  drawMoto();

  // Speed lines
  if (moto.speed > 5) drawSpeedLines();
}

function drawBuildings() {
  ctx.save();
  const buildings = [
    {ox:0, w:60, h:90, c:'#111'},
    {ox:80, w:40, h:140, c:'#0e0e0e'},
    {ox:140, w:80, h:70, c:'#131313'},
    {ox:250, w:50, h:110, c:'#111'},
    {ox:320, w:70, h:85, c:'#0e0e0e'},
    {ox:420, w:55, h:130, c:'#131313'},
    {ox:500, w:90, h:65, c:'#111'},
  ];
  const off = (camX * 0.15) % W;
  for (let rep = -1; rep <= 1; rep++) {
    buildings.forEach(b => {
      ctx.fillStyle = b.c;
      const bx = (b.ox - off + rep * W + W) % (W * 1.5) - 50;
      ctx.fillRect(bx, GY - b.h, b.w, b.h);
      // windows
      ctx.fillStyle = 'rgba(227,27,35,0.08)';
      for (let wy = GY - b.h + 10; wy < GY - 10; wy += 18) {
        for (let wx = bx + 8; wx < bx + b.w - 8; wx += 14) {
          if (Math.random() > 0.6) ctx.fillRect(wx, wy, 8, 10);
        }
      }
    });
  }
  ctx.restore();
}

function drawGround() {
  // Road
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, GY, W, H - GY);

  // Road edge line
  ctx.strokeStyle = RS_RED;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GY);
  ctx.lineTo(W, GY);
  ctx.stroke();

  // Shadow under road
  const grad = ctx.createLinearGradient(0, GY, 0, GY + 30);
  grad.addColorStop(0, 'rgba(227,27,35,0.15)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, GY, W, 30);
}

function drawRoadMarks() {
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  roadMarks.forEach(r => {
    const sx = r.x - camX;
    if (sx > -60 && sx < W + 60) {
      ctx.fillRect(sx, GY + 12, 40, 6);
    }
  });
}

function drawObstacles() {
  obstacles.forEach(o => {
    const sx = o.x - camX;
    if (sx < -50 || sx > W + 50) return;
    if (o.type === 'cone') {
      // Traffic cone
      ctx.save();
      ctx.translate(sx, GY);
      ctx.fillStyle = RS_RED;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(-12, -36);
      ctx.lineTo(12, -36);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = 'white';
      ctx.fillRect(-10, -20, 20, 5);
      ctx.restore();
    } else if (o.type === 'bump') {
      ctx.save();
      ctx.translate(sx, GY);
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.ellipse(0, 0, 20, 8, 0, Math.PI, 0);
      ctx.fill();
      ctx.restore();
    }
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = RS_RED;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

function drawMoto() {
  const m = moto;
  const sx = W * 0.25;
  const sy = m.y;

  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(m.angle);

  // Shadow
  ctx.save();
  ctx.globalAlpha = 0.3 * (1 - Math.abs(m.angle) / CRASH_ANGLE);
  ctx.scale(1, 0.3);
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(0, 8, 40, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // ── ENDURO XR STYLE MOTO ──
  const t = Date.now();

  // Rear wheel (bigger, knobby)
  drawEnduroWheel(ctx, -32, 0, 22);
  // Front wheel (bigger)
  drawEnduroWheel(ctx, 34, 0, 22);

  // Swing arm
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(-6, -8);
  ctx.lineTo(-32, 0);
  ctx.stroke();

  // Main frame (high, enduro style)
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 4;
  // Down tube
  ctx.beginPath();
  ctx.moveTo(0, -10);
  ctx.lineTo(-8, -34);
  ctx.stroke();
  // Top tube
  ctx.beginPath();
  ctx.moveTo(-8, -34);
  ctx.lineTo(14, -34);
  ctx.stroke();
  // Seat tube
  ctx.beginPath();
  ctx.moveTo(14, -34);
  ctx.lineTo(8, -12);
  ctx.stroke();
  // Fork
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(20, -28);
  ctx.lineTo(34, 0);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(22, -28);
  ctx.lineTo(36, 0);
  ctx.stroke();

  // Fork brace
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(21, -14);
  ctx.lineTo(35, -14);
  ctx.stroke();

  // Subframe (seat area)
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-8, -34);
  ctx.lineTo(-18, -28);
  ctx.lineTo(-22, -14);
  ctx.stroke();

  // Engine block
  ctx.fillStyle = '#2a2a2a';
  ctx.beginPath();
  ctx.moveTo(-2, -10);
  ctx.lineTo(0, -28);
  ctx.lineTo(14, -28);
  ctx.lineTo(14, -10);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Engine fins
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  for(let fi=0; fi<4; fi++){
    ctx.beginPath();
    ctx.moveTo(1, -12 - fi*4);
    ctx.lineTo(13, -12 - fi*4);
    ctx.stroke();
  }

  // Exhaust pipe (high mount enduro style)
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(8, -12);
  ctx.quadraticCurveTo(20, -4, 24, 4);
  ctx.stroke();
  // Muffler
  ctx.fillStyle = '#666';
  ctx.beginPath();
  ctx.roundRect(18, 0, 20, 8, 3);
  ctx.fill();

  // Red plastic side cover
  ctx.fillStyle = RS_RED;
  ctx.beginPath();
  ctx.moveTo(-2, -28);
  ctx.lineTo(12, -30);
  ctx.lineTo(16, -22);
  ctx.lineTo(12, -16);
  ctx.lineTo(-4, -16);
  ctx.closePath();
  ctx.fill();

  // White lower panel
  ctx.fillStyle = '#e8e8e8';
  ctx.beginPath();
  ctx.moveTo(-4, -16);
  ctx.lineTo(12, -16);
  ctx.lineTo(14, -10);
  ctx.lineTo(-2, -10);
  ctx.closePath();
  ctx.fill();

  // Red tank
  ctx.fillStyle = RS_RED;
  ctx.beginPath();
  ctx.moveTo(-6, -34);
  ctx.lineTo(14, -36);
  ctx.lineTo(18, -28);
  ctx.lineTo(12, -28);
  ctx.lineTo(-2, -28);
  ctx.closePath();
  ctx.fill();

  // Seat
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.moveTo(-20, -28);
  ctx.lineTo(-8, -36);
  ctx.lineTo(6, -36);
  ctx.lineTo(0, -28);
  ctx.closePath();
  ctx.fill();

  // Headlight (round enduro style)
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(30, -24, 9, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,220,100,0.8)';
  ctx.beginPath();
  ctx.arc(30, -24, 6, 0, Math.PI*2);
  ctx.fill();

  // Headlight shroud (red)
  ctx.fillStyle = RS_RED;
  ctx.beginPath();
  ctx.moveTo(16, -32);
  ctx.lineTo(36, -32);
  ctx.lineTo(40, -22);
  ctx.lineTo(34, -18);
  ctx.lineTo(20, -20);
  ctx.lineTo(14, -26);
  ctx.closePath();
  ctx.fill();

  // Headlight cutout
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(30, -24, 8, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,220,150,0.9)';
  ctx.beginPath();
  ctx.arc(30, -24, 5, 0, Math.PI*2);
  ctx.fill();

  // Handlebar (high, wide enduro style)
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(14, -36);
  ctx.lineTo(12, -44);
  ctx.stroke();
  ctx.strokeStyle = '#777';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(2, -44);
  ctx.lineTo(22, -44);
  ctx.stroke();
  // Grips
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(2, -44);
  ctx.lineTo(6, -44);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(18, -44);
  ctx.lineTo(22, -44);
  ctx.stroke();

  // Exhaust smoke when wheeling
  if (m.angle < -0.3) {
    for(let s=0;s<3;s++){
      ctx.globalAlpha = 0.2 * Math.abs(m.angle) * (1-s*0.3);
      ctx.fillStyle = '#888';
      ctx.beginPath();
      ctx.arc(38 + s*8 + Math.sin(t*0.01+s)*3, 4 + s*3, 4+s*2, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Headlight glow
  ctx.globalAlpha = 0.25;
  const gl = ctx.createRadialGradient(30, -24, 0, 30, -24, 30);
  gl.addColorStop(0, 'rgba(255,220,100,0.9)');
  gl.addColorStop(1, 'rgba(255,220,100,0)');
  ctx.fillStyle = gl;
  ctx.beginPath();
  ctx.arc(30, -24, 30, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Rider
  drawRider(ctx, m.angle);

  ctx.restore();
}

function drawWheel(ctx, x, y, r) {
  drawEnduroWheel(ctx, x, y, r);
}

function drawEnduroWheel(ctx, x, y, r) {
  ctx.save();
  ctx.translate(x, y);
  const t = Date.now();
  // Knobby tire (thick)
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 10;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.stroke();
  // Tire tread knobs
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 3;
  for(let i=0;i<12;i++){
    const a = (i/12)*Math.PI*2 + t*0.004;
    const ox = Math.cos(a)*(r+2), oy = Math.sin(a)*(r+2);
    const ix = Math.cos(a)*(r-4), iy = Math.sin(a)*(r-4);
    ctx.beginPath();
    ctx.moveTo(ix,iy);
    ctx.lineTo(ox,oy);
    ctx.stroke();
  }
  // Rim (silver spoked enduro style)
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, r-6, 0, Math.PI*2);
  ctx.stroke();
  // Spokes (thin, many)
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 1;
  for(let i=0;i<18;i++){
    const a = (i/18)*Math.PI*2 + t*0.004;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(Math.cos(a)*(r-6), Math.sin(a)*(r-6));
    ctx.stroke();
  }
  // Hub
  ctx.fillStyle = '#888';
  ctx.beginPath();
  ctx.arc(0,0,5,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(0,0,3,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawRider(ctx, angle) {
  const lean = angle * 0.5;
  ctx.save();
  ctx.translate(-2, -26);
  ctx.rotate(lean);
  // Body
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(-6, -16, 12, 16);
  // Helmet
  ctx.fillStyle = RS_RED;
  ctx.beginPath();
  ctx.arc(0, -20, 8, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.arc(3, -22, 3, 0, Math.PI*2);
  ctx.fill();
  // Arms
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(4, -12);
  ctx.lineTo(14, -8);
  ctx.stroke();
  // Legs
  ctx.beginPath();
  ctx.moveTo(-2, 0);
  ctx.lineTo(8, 8);
  ctx.stroke();
  ctx.restore();
}

function drawSpeedLines() {
  ctx.save();
  ctx.globalAlpha = (moto.speed - 5) / MAX_SPEED * 0.15;
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 1;
  for (let i = 0; i < 8; i++) {
    const y = (i / 8) * GY + Math.sin(Date.now()*0.001 + i) * 20;
    const len = 60 + Math.random() * 80;
    ctx.beginPath();
    ctx.moveTo(W * 0.6, y);
    ctx.lineTo(W * 0.6 + len, y);
    ctx.stroke();
  }
  ctx.restore();
}

// ── PREVIEW ──
function drawPreview() {
  const pc = document.getElementById('preview-canvas');
  const pctx = pc.getContext('2d');
  pctx.clearRect(0, 0, 260, 120);

  // Ground
  pctx.fillStyle = '#1a1a1a';
  pctx.fillRect(0, 85, 260, 35);
  pctx.strokeStyle = RS_RED;
  pctx.lineWidth = 2;
  pctx.beginPath();
  pctx.moveTo(0, 85);
  pctx.lineTo(260, 85);
  pctx.stroke();

  // Moto preview (enduro style)
  pctx.save();
  pctx.translate(130, 85);
  pctx.rotate(-0.35);
  drawEnduroWheel(pctx, -32, 0, 22);
  drawEnduroWheel(pctx, 34, 0, 22);
  // Frame
  pctx.strokeStyle = '#888'; pctx.lineWidth = 4;
  pctx.beginPath(); pctx.moveTo(0,-10); pctx.lineTo(-8,-34); pctx.stroke();
  pctx.beginPath(); pctx.moveTo(-8,-34); pctx.lineTo(14,-34); pctx.stroke();
  // Red panels
  pctx.fillStyle = RS_RED;
  pctx.beginPath(); pctx.moveTo(-2,-28); pctx.lineTo(12,-30); pctx.lineTo(16,-22); pctx.lineTo(-4,-16); pctx.closePath(); pctx.fill();
  pctx.beginPath(); pctx.moveTo(-6,-34); pctx.lineTo(14,-36); pctx.lineTo(16,-28); pctx.lineTo(-2,-28); pctx.closePath(); pctx.fill();
  drawRider(pctx, -0.35);
  pctx.restore();

  // Text
  pctx.fillStyle = 'rgba(255,255,255,0.2)';
  pctx.font = "bold 11px 'Barlow Condensed'";
  pctx.textAlign = 'center';
  pctx.letterSpacing = '2px';
  pctx.fillText('MANTENÉ PARA HACER WHEELIE', 130, 110);
}

// ── BOOT ──
window.addEventListener('load', init);
</script>
